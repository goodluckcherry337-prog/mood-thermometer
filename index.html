<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媽咪心情溫度計 - 溫馨陪伴空間</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs with Google Auth Hybrid Loader -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, updateDoc, getDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let firebaseConfig = null;
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = JSON.parse(__firebase_config);
            }
        } catch (e) {
            console.warn("Could not load cloud configurations. Switching to local account simulator.", e);
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mommy-mood-tracker';

        if (firebaseConfig) {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const googleProvider = new GoogleAuthProvider();

            window.FirebaseServices = { 
                auth, db, appId, signInAnonymously, onAuthStateChanged, signInWithCustomToken, 
                signInWithGoogle: () => signInWithPopup(auth, googleProvider), signOut,
                collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, updateDoc, getDoc, query,
                isMock: false
            };
            window.dispatchEvent(new Event('firebase-ready'));
        } else {
            console.log("Running simulated cloud engine on GitHub / Local...");
            setupLocalServices();
        }

        // 本地模擬 Google 帳號與儲存服務 (供 GitHub Pages 完美運行與測試一鍵連動)
        function setupLocalServices() {
            window.localListeners = window.localListeners || {};
            window.authCallbacks = window.authCallbacks || [];
            
            // 讀取目前的模擬登入 Session
            let currentSession = JSON.parse(localStorage.getItem('local_current_user') || 'null');
            
            window.triggerLocalAuthState = (u) => {
                currentSession = u;
                window.authCallbacks.forEach(cb => cb(u));
            };

            const mockCollection = (db, ...paths) => ({ path: paths.join('/') });
            const mockDoc = (db, ...paths) => ({ path: paths.join('/') });

            window.FirebaseServices = {
                auth: { get currentUser() { return currentSession; } },
                db: 'local-db',
                appId: appId,
                isMock: true,
                signInAnonymously: async () => {
                    const guest = { uid: 'guest-mom-user', isAnonymous: true };
                    localStorage.setItem('local_current_user', JSON.stringify(guest));
                    window.triggerLocalAuthState(guest);
                    return { user: guest };
                },
                signInWithCustomToken: async () => {
                    const guest = { uid: 'guest-mom-user', isAnonymous: true };
                    return { user: guest };
                },
                // 虛擬 Google 登入一鍵模擬
                signInWithGoogle: async (emailVal = 'mommy@gmail.com') => {
                    const mockUser = { 
                        uid: 'mock_g_user_' + emailVal.replace(/[^a-zA-Z0-9]/g, ''), 
                        email: emailVal, 
                        displayName: '孕媽咪寶貝',
                        photoURL: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=100',
                        isAnonymous: false 
                    };
                    localStorage.setItem('local_current_user', JSON.stringify(mockUser));
                    window.triggerLocalAuthState(mockUser);
                    return { user: mockUser };
                },
                signOut: async () => {
                    localStorage.removeItem('local_current_user');
                    window.triggerLocalAuthState(null);
                },
                onAuthStateChanged: (auth, callback) => {
                    window.authCallbacks.push(callback);
                    setTimeout(() => callback(currentSession), 100);
                    return () => {
                        window.authCallbacks = window.authCallbacks.filter(cb => cb !== callback);
                    };
                },
                collection: mockCollection,
                doc: mockDoc,
                addDoc: async (collRef, data) => {
                    const path = collRef.path;
                    const list = JSON.parse(localStorage.getItem(path) || '[]');
                    const newDoc = { id: 'doc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5), ...data };
                    list.push(newDoc);
                    localStorage.setItem(path, JSON.stringify(list));
                    if (window.localListeners[path]) {
                        window.localListeners[path].forEach(cb => cb(list));
                    }
                    return newDoc;
                },
                onSnapshot: (query, callback) => {
                    const path = query.path;
                    if (!window.localListeners[path]) window.localListeners[path] = [];
                    const listener = (list) => {
                        callback({
                            docs: list.map(item => ({
                                id: item.id,
                                data: () => item
                            }))
                        });
                    };
                    window.localListeners[path].push(listener);
                    const currentList = JSON.parse(localStorage.getItem(path) || '[]');
                    setTimeout(() => listener(currentList), 50);
                    return () => {
                        window.localListeners[path] = window.localListeners[path].filter(cb => cb !== listener);
                    };
                },
                setDoc: async (docRef, data) => {
                    const path = docRef.path;
                    localStorage.setItem(path, JSON.stringify(data));
                    return {};
                },
                getDoc: async (docRef) => {
                    const path = docRef.path;
                    const item = localStorage.getItem(path);
                    return {
                        exists: () => item !== null,
                        data: () => JSON.parse(item)
                    };
                },
                deleteDoc: async (docRef) => {
                    const rawPath = docRef.path;
                    const parts = rawPath.split('/');
                    const idToDelete = parts.pop();
                    const parentPath = parts.join('/');
                    
                    let list = JSON.parse(localStorage.getItem(parentPath) || '[]');
                    list = list.filter(item => item.id !== idToDelete);
                    localStorage.setItem(parentPath, JSON.stringify(list));
                    if (window.localListeners[parentPath]) {
                        window.localListeners[parentPath].forEach(cb => cb(list));
                    }
                    return {};
                },
                updateDoc: async (docRef, updatedFields) => {
                    const rawPath = docRef.path;
                    const parts = rawPath.split('/');
                    const idToUpdate = parts.pop();
                    const parentPath = parts.join('/');
                    
                    let list = JSON.parse(localStorage.getItem(parentPath) || '[]');
                    list = list.map(item => item.id === idToUpdate ? { ...item, ...updatedFields } : item);
                    localStorage.setItem(parentPath, JSON.stringify(list));
                    if (window.localListeners[parentPath]) {
                        window.localListeners[parentPath].forEach(cb => cb(list));
                    }
                    return {};
                },
                query: (q) => q
            };
            window.dispatchEvent(new Event('firebase-ready'));
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

            transition: transform 0.2s ease-in-out;

        .sticker-effect:hover {

        // --- 內建及自訂導覽說明頁面資料 (重新補回並放置最頂層防 TDZ) ---
        const tutorialSlides = [
            { title: "歡迎來到妳的避風港 💖", desc: "親愛的媽咪，讓我們陪妳度過這段奇妙的旅程。", icon: "heart" },
            { title: "心情溫度計 🌡️", desc: "每天滑動溫度計記錄情緒，點選「儲存紀錄」留下足跡。", icon: "thermometer" },
            { title: "暖心與自訂貼圖 🧸", desc: "日記中可以加入我們精選的實體貼紙效果圖示，甚至可以上傳超音波照片做成雲端專屬貼圖，完全不佔手機空間喔！", icon: "smile" },
            { title: "今日心情快篩 📝", desc: "首頁上方的卡片可以進行快速自我檢測。", icon: "check" },
            { title: "日曆回顧與補寫 📅", desc: "點擊日期查看紀錄。若那天沒記，點選後點擊「補寫」即可補填。", icon: "edit" },
            { title: "Google 一鍵雲端備份 ☁️", desc: "媽咪只要點擊一鍵連動 Google 登入，心情回憶永不遺失！", icon: "google" }
        ];

        const App = () => {
            const [isInit, setIsInit] = useState(false);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('welcome'); // 預設進入 welcome 登入入口
            const [moodScore, setMoodScore] = useState(50);
            const [diaryText, setDiaryText] = useState('');
            
            // 貼圖狀態管理
            const [selectedStickers, setSelectedStickers] = useState([]);
            const [customStickers, setCustomStickers] = useState([]);
            const [showStickerPicker, setShowStickerPicker] = useState(false);
            const [activeStickerTab, setActiveStickerTab] = useState('builtin');

            // 虛擬 Google 登入模擬器
            const [showMockGoogleSelector, setShowMockGoogleSelector] = useState(false);

            // 內建安全提示與但書宣告彈窗
            const [toast, setToast] = useState('');
            const [showDisclaimerPopup, setShowDisclaimerPopup] = useState(false);

            // 自訂確認彈窗狀態
            const [stickerToDelete, setStickerToDelete] = useState(null);
            const [recordToDelete, setRecordToDelete] = useState(null);

            const [records, setRecords] = useState([]);
            const [chatMessages, setChatMessages] = useState([{ role: 'assistant', text: '親愛的媽咪，我是 Gemini。今天感覺如何？任何想說的心裡話，都可以隨時跟我分享喔。' }]);
            const [inputMessage, setInputMessage] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [showTutorial, setShowTutorial] = useState(false);
            const [tutorialStep, setTutorialStep] = useState(0);
            const [surveyResults, setSurveyResults] = useState({ q1: null, q2: null });
            const [showSurveyResult, setShowSurveyResult] = useState(false);
            const [editingRecord, setEditingRecord] = useState(null);
            
            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            // --- 內建暖心 Toast 提示條 ---
            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3000);
            };

            // --- 點擊關閉說明處理 ---
            const handleCompleteTutorial = async () => {
                if (!user || !window.FirebaseServices) {
                    setShowTutorial(false);
                    return;
                }
                const { db, appId, setDoc, doc } = window.FirebaseServices;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'prefs'), { tutorialSeen: true });
                } catch (err) {
                    console.error("儲存偏好失敗", err);
                }
                setShowTutorial(false);
            };

            // --- 儲存心情與日記紀錄 ---
            const handleSave = async () => {
                if (!user || !window.FirebaseServices) return;
                const { db, appId, collection, addDoc } = window.FirebaseServices;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'mood_history'), {
                        score: moodScore, 
                        text: getMoodText(moodScore), 
                        diary: diaryText, 
                        stickers: selectedStickers,
                        timestamp: Date.now()
                    });
                    setDiaryText(''); 
                    setSelectedStickers([]);
                    setView('history');
                } catch (err) {
                    console.error("儲存紀錄失敗", err);
                    showToast("儲存失敗，請重試");
                }
            };

            // --- 貼圖操作邏輯 ---
            const handleAddSticker = (sticker) => {
                if (selectedStickers.length >= 5) {
                    showToast("最多只能選擇 5 張貼圖裝飾日記喔！");
                    return;
                }
                setSelectedStickers(prev => [...prev, sticker]);
                setShowStickerPicker(false);
            };

            const handleRemoveSelectedSticker = (index) => {
                setSelectedStickers(prev => prev.filter((_, i) => i !== index));
            };

            const handleCustomStickerUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const maxDim = 120; // 壓縮微縮化 120px
                        let w = img.width;
                        let h = img.height;
                        if (w > h) {
                            if (w > maxDim) {
                                h = Math.round((h * maxDim) / w);
                                w = maxDim;
                            }
                        } else {
                            if (h > maxDim) {
                                w = Math.round((w * maxDim) / h);
                                h = maxDim;
                            }
                        }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        
                        const base64 = canvas.toDataURL('image/png', 0.7);
                        
                        if (user && isInit) {
                            const { db, appId, collection, addDoc } = window.FirebaseServices;
                            try {
                                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'custom_stickers'), {
                                    char: base64,
                                    type: 'custom',
                                    timestamp: Date.now()
                                });
                            } catch (err) {
                                console.error("上傳貼圖失敗", err);
                            }
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleDeleteCustomSticker = async (id) => {
                if (user && isInit) {
                    const { db, appId, deleteDoc, doc } = window.FirebaseServices;
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'custom_stickers', id));
                        setSelectedStickers(prev => prev.filter(s => s.id !== id));
                    } catch (err) {
                        console.error("刪除貼圖失敗", err);
                    }
                }
            };

            // --- 免登入直接體驗處理 ---
            const handleGuestAccess = async () => {
                localStorage.setItem('guest_access_granted', 'true');
                if (isInit) {
                    const { auth, signInAnonymously } = window.FirebaseServices;
                    try {
                        await signInAnonymously(auth);
                    } catch (e) {

            // --- 溫柔 Gemini 夥伴 ---
            const callGemini = async (prompt) => {
                const apiKey = "";
                const maxRetries = 5;
                let delay = 1000;

                for (let i = 0; i < maxRetries; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: "妳是一位溫柔、有耐心的孕期心理諮詢顧問。請用溫暖的口氣安慰並鼓勵媽咪。字數保持在 150 字以內。" }] }
                            })
                        });
                        if (!response.ok) throw new Error("API 響應錯誤");
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text || "媽咪，我一直在這，慢慢說，我聽著呢。";
                    } catch (err) {
                        if (i === maxRetries - 1) throw err;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }

                const total = new Date(year, month + 1, 0).getDate();

                                        </div>
                                    )}
                                </div>

                                <textarea value={editingRecord.diary} onChange={e => setEditingRecord({...editingRecord, diary: e.target.value})} className="flex-grow bg-slate-50 rounded-3xl p-5 text-sm outline-none resize-none mb-6 border border-slate-100 shadow-inner" />
                                <button onClick={() => { 
                                    if (user && window.FirebaseServices) {
                                        const { db, appId, updateDoc, doc } = window.FirebaseServices;
                                        updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'mood_history', editingRecord.id), { 
                                            score: editingRecord.score, 
                                            text: getMoodText(editingRecord.score), 
                                            diary: editingRecord.diary,
                                            stickers: selectedStickers
                                        }).then(() => {
                                            setEditingRecord(null); 
                                            setSelectedStickers([]);
                                        }).catch(err => {
                                            console.error("更新日記失敗", err);
                                            showToast("更新日記失敗，請重試。");
                                        });
                                    }
                                }} className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold shadow-xl flex items-center justify-center gap-2 active:scale-95">
                                    <Icon name="save" size={18}/> 儲存更新
                                </button>
                            </div>
                        )}

                        {/* STICKER PICKER MODAL */}
                        {showStickerPicker && (
                            <div className="absolute inset-x-0 bottom-0 bg-white rounded-t-[2.5rem] shadow-2xl border-t border-pink-100 p-6 z-[200] animate-in slide-in-from-bottom duration-300 max-h-[360px] flex flex-col">
                                <div className="flex justify-between items-center mb-4">
                                    <h4 className="font-bold text-pink-600 flex items-center gap-2">🧸 選擇貼圖</h4>
                                    <button onClick={() => setShowStickerPicker(false)} className="p-2 hover:bg-slate-100 rounded-full">
                                        <Icon name="x" size={18} className="text-slate-400" />
                                    </button>
                                </div>

                                <div className="flex border-b border-pink-50 mb-4 text-xs font-bold">
                                    <button onClick={() => setActiveStickerTab('builtin')} className={`flex-1 pb-3 text-center transition-all ${activeStickerTab === 'builtin' ? 'border-b-2 border-pink-500 text-pink-500' : 'text-slate-400'}`}>
                                        內建暖心貼圖
                                    </button>
                                    <button onClick={() => setActiveStickerTab('custom')} className={`flex-1 pb-3 text-center transition-all ${activeStickerTab === 'custom' ? 'border-b-2 border-pink-500 text-pink-500' : 'text-slate-400'}`}>
                                        雲端自訂貼圖 ({customStickers.length})
                                    </button>
                                </div>

                                <div className="flex-grow overflow-y-auto custom-scrollbar pb-4">
                                    {activeStickerTab === 'builtin' && (
                                        <div className="grid grid-cols-5 gap-4 justify-items-center">
                                            {BUILTIN_STICKERS.map((stk) => (
                                                <button key={stk.id} onClick={() => handleAddSticker(stk)} className="text-4xl sticker-effect select-none p-1 focus:outline-none animate-in zoom-in-50">
                                                    {stk.char}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {activeStickerTab === 'custom' && (
                                        <div className="grid grid-cols-4 gap-4 justify-items-center items-center">
                                            <button onClick={() => fileInputRef.current.click()} className="w-16 h-16 rounded-2xl border-2 border-dashed border-pink-200 hover:border-pink-400 text-pink-400 flex items-center justify-center transition-colors active:scale-95" title="上傳照片做成貼圖">
                                                <Icon name="plus" size={28} />
                                            </button>
                                            <input type="file" ref={fileInputRef} onChange={handleCustomStickerUpload} accept="image/*" className="hidden" />

                                            {customStickers.map((stk) => (
                                                <div key={stk.id} className="relative group w-16 h-16 animate-in fade-in zoom-in-75">
                                                    <img 
                                                        src={stk.char} 
                                                        onClick={() => handleAddSticker(stk)}
                                                        className="w-full h-full object-contain rounded-xl border border-slate-100 sticker-effect cursor-pointer" 
                                                    />
                                                    <button 
                                                        onClick={(e) => { 
                                                            e.stopPropagation();
                                                            e.preventDefault();
                                                            setStickerToDelete(stk); 
                                                        }} 
                                                        className="absolute -top-1.5 -right-1.5 bg-rose-500 hover:bg-rose-600 text-white rounded-full shadow-md transition-all active:scale-75 z-[210] w-5 h-5 flex items-center justify-center"
                                                        title="自雲端永久刪除貼圖"
                                                    >
                                                        <Icon name="x" size={10} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <footer className="mt-4 text-[9px] text-slate-300 font-bold uppercase tracking-[0.2em] px-4 text-center">© 2024 MOMMY'S MOOD HARBOR ・ 給媽咪最溫柔的記憶足跡</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
