<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媽咪心情溫度計 - 溫馨陪伴空間</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, updateDoc, getDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mommy-mood-tracker';

        // 將 Firebase 服務存入全域供 React 呼叫，確保有完美的記憶功能
        window.FirebaseServices = { 
            auth, db, appId, signInAnonymously, onAuthStateChanged, signInWithCustomToken, 
            collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, updateDoc, getDoc, query 
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff1f2; margin: 0; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #ec4899; cursor: pointer; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .tutorial-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; background-color: rgba(255, 241, 242, 0.95); backdrop-filter: blur(12px);
        }

        /* 經典實體貼紙白色邊框與陰影特效 */
        .sticker-effect {
            filter: drop-shadow(2px 0 0 #fff) drop-shadow(-2px 0 0 #fff) drop-shadow(0 2px 0 #fff) drop-shadow(0 -2px 0 #fff) drop-shadow(0 4px 6px rgba(0,0,0,0.15));
            transition: transform 0.2s ease-in-out;
        }
        .sticker-effect:hover {
            transform: scale(1.1) rotate(2deg);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 穩定版 SVG 圖示組件 ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                calendar: (
                    <React.Fragment>
                        <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                        <path d="M16 2v4M8 2v4M3 10h18" />
                    </React.Fragment>
                ),
                info: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4M12 8h.01" />
                    </React.Fragment>
                ),
                thermometer: <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z" />,
                check: (
                    <React.Fragment>
                        <path d="m9 11 3 3L22 4" />
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                    </React.Fragment>
                ),
                edit: (
                    <React.Fragment>
                        <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z" />
                    </React.Fragment>
                ),
                message: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
                trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />,
                save: (
                    <React.Fragment>
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                        <polyline points="7 3 7 8 15 8" />
                    </React.Fragment>
                ),
                download: (
                    <React.Fragment>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" x2="12" y1="15" y2="3" />
                    </React.Fragment>
                ),
                left: <path d="m15 18-6-6 6-6" />,
                right: <path d="m9 18 6-6 9-6" />,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                plus: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 12h8M12 8v8" />
                    </React.Fragment>
                ),
                sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z" />,
                loader: <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />,
                send: (
                    <React.Fragment>
                        <path d="m22 2-7 20-4-9-9-4Z" />
                        <path d="M22 2 11 13" />
                    </React.Fragment>
                ),
                image: (
                    <React.Fragment>
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                        <circle cx="9" cy="9" r="2" />
                        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                    </React.Fragment>
                ),
                smile: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" />
                    </React.Fragment>
                )
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- 內建貼圖列表 ---
        const BUILTIN_STICKERS = [
            { id: "s_baby", char: "👶", type: "emoji" },
            { id: "s_bottle", char: "🍼", type: "emoji" },
            { id: "s_pregnant", char: "🤰", type: "emoji" },
            { id: "s_teddy", char: "🧸", type: "emoji" },
            { id: "s_feet", char: "👣", type: "emoji" },
            { id: "s_heart", char: "💖", type: "emoji" },
            { id: "s_coffee", char: "☕", type: "emoji" },
            { id: "s_star", char: "⭐", type: "emoji" },
            { id: "s_clover", char: "🍀", type: "emoji" },
            { id: "s_sun", char: "☀️", type: "emoji" },
            { id: "s_smile", char: "😊", type: "emoji" },
            { id: "s_cry", char: "😭", type: "emoji" },
            { id: "s_tired", char: "😴", type: "emoji" },
            { id: "s_love", char: "🥰", type: "emoji" },
            { id: "s_party", char: "🥳", type: "emoji" }
        ];

        const App = () => {
            const [isInit, setIsInit] = useState(false);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [moodScore, setMoodScore] = useState(50);
            const [diaryText, setDiaryText] = useState('');
            
            // 貼圖狀態管理
            const [selectedStickers, setSelectedStickers] = useState([]);
            const [customStickers, setCustomStickers] = useState([]);
            const [showStickerPicker, setShowStickerPicker] = useState(false);
            const [activeStickerTab, setActiveStickerTab] = useState('builtin');

            // 內建安全提示 (代替被 Iframe 擋掉的 Alert)
            const [toast, setToast] = useState('');

            // 自訂確認彈窗狀態 (代替被 Iframe 擋掉的 Confirm)
            const [stickerToDelete, setStickerToDelete] = useState(null);
            const [recordToDelete, setRecordToDelete] = useState(null);

            const [records, setRecords] = useState([]);
            const [chatMessages, setChatMessages] = useState([{ role: 'assistant', text: '親愛的媽咪，我是 Gemini。今天感覺如何？任何想說的心裡話，都可以隨時跟我分享喔。' }]);
            const [inputMessage, setInputMessage] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [showTutorial, setShowTutorial] = useState(false);
            const [tutorialStep, setTutorialStep] = useState(0);
            const [surveyResults, setSurveyResults] = useState({ q1: null, q2: null });
            const [showSurveyResult, setShowSurveyResult] = useState(false);
            const [editingRecord, setEditingRecord] = useState(null);
            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3000);
            };

            // --- Firebase 初始化偵測 ---
            useEffect(() => {
                const checkReady = () => {
                    if (window.FirebaseServices) {
                        setIsInit(true);
                        return true;
                    }
                    return false;
                };
                if (!checkReady()) window.addEventListener('firebase-ready', checkReady);
                return () => window.removeEventListener('firebase-ready', checkReady);
            }, []);

            // --- 身分驗證 ---
            useEffect(() => {
                if (!isInit) return;
                const { auth, db, appId, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getDoc, doc } = window.FirebaseServices;
                
                const startAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                startAuth();

                const unsubscribe = onAuthStateChanged(auth, async (u) => {
                    setUser(u);
                    if (u) {
                        const prefRef = doc(db, 'artifacts', appId, 'users', u.uid, 'settings', 'prefs');
                        const snap = await getDoc(prefRef);
                        if (!snap.exists() || !snap.data().tutorialSeen) setShowTutorial(true);
                    }
                });
                return () => unsubscribe();
            }, [isInit]);

            // --- 歷史紀錄記憶同步 ---
            useEffect(() => {
                if (!user || !isInit) return;
                const { db, appId, collection, onSnapshot } = window.FirebaseServices;
                const q = collection(db, 'artifacts', appId, 'users', user.uid, 'mood_history');
                return onSnapshot(q, (snap) => {
                    setRecords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user, isInit]);

            // --- 自訂貼圖雲端記憶讀取 (從 Firestore 載入) ---
            useEffect(() => {
                if (!user || !isInit) return;
                const { db, appId, collection, onSnapshot } = window.FirebaseServices;
                const q = collection(db, 'artifacts', appId, 'users', user.uid, 'custom_stickers');
                
                const unsubscribe = onSnapshot(q, (snap) => {
                    const loadedStickers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setCustomStickers(loadedStickers.sort((a, b) => b.timestamp - a.timestamp));
                }, (err) => console.error("載入自訂貼圖失敗", err));

                return () => unsubscribe();
            }, [user, isInit]);

            // --- 溫度計繪製 ---
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const score = editingRecord ? editingRecord.score : moodScore;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const color = getMoodColor(score);
                
                ctx.beginPath();
                ctx.arc(30, 135, 24, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(20, 135); ctx.lineTo(20, 25);
                ctx.arc(30, 25, 10, Math.PI, 0);
                ctx.lineTo(40, 135);
                ctx.fillStyle = '#f8fafc'; ctx.fill(); ctx.stroke();

                const fillH = (110) * (score / 100);
                ctx.fillStyle = color;
                ctx.fillRect(23, 130 - fillH, 14, fillH);
            }, [moodScore, view, editingRecord, isInit]);

            const getMoodColor = (s) => s < 30 ? '#60a5fa' : s < 60 ? '#34d399' : s < 85 ? '#fbbf24' : '#f87171';
            const getMoodText = (s) => s < 30 ? '平靜微憂' : s < 60 ? '愉快穩定' : s < 85 ? '焦慮上升' : '情緒緊繃';

            // --- 貼圖操作邏輯 ---
            const handleAddSticker = (sticker) => {
                if (selectedStickers.length >= 5) {
                    showToast("最多只能選擇 5 張貼圖裝飾日記喔！");
                    return;
                }
                setSelectedStickers(prev => [...prev, sticker]);
                setShowStickerPicker(false);
            };

            const handleRemoveSelectedSticker = (index) => {
                setSelectedStickers(prev => prev.filter((_, i) => i !== index));
            };

            // 處理自訂貼圖上傳並進行 Canvas 智慧縮圖，再存入雲端資料庫
            const handleCustomStickerUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const maxDim = 120; // 壓縮至 120 像素，確保完美相容 
                        let w = img.width;
                        let h = img.height;
                        if (w > h) {
                            if (w > maxDim) {
                                h = Math.round((h * maxDim) / w);
                                w = maxDim;
                            }
                        } else {
                            if (h > maxDim) {
                                w = Math.round((w * maxDim) / h);
                                h = maxDim;
                            }
                        }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        
                        // 轉為 Base64 格式，並使用 70% 壓縮率以極限縮小檔案，提升存取速度與不耗流量
                        const base64 = canvas.toDataURL('image/png', 0.7);
                        
                        if (user && isInit) {
                            const { db, appId, collection, addDoc } = window.FirebaseServices;
                            try {
                                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'custom_stickers'), {
                                    char: base64,
                                    type: 'custom',
                                    timestamp: Date.now()
                                });
                            } catch (err) {
                                console.error("上傳貼圖到雲端資料庫失敗", err);
                            }
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            // 刪除自訂貼圖並同步自雲端移除
            const handleDeleteCustomSticker = async (id) => {
                if (user && isInit) {
                    const { db, appId, deleteDoc, doc } = window.FirebaseServices;
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'custom_stickers', id));
                        // 如果當前被選取的貼圖中有被刪除的自訂貼圖，也一併移出選取
                        setSelectedStickers(prev => prev.filter(s => s.id !== id));
                    } catch (err) {
                        console.error("刪除雲端貼圖失敗", err);
                    }
                }
            };

            const handleCompleteTutorial = async () => {
                const { db, appId, setDoc, doc } = window.FirebaseServices;
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'prefs'), { tutorialSeen: true });
                setShowTutorial(false);
            };

            const handleSave = async () => {
                const { db, appId, collection, addDoc } = window.FirebaseServices;
                await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'mood_history'), {
                    score: moodScore, 
                    text: getMoodText(moodScore), 
                    diary: diaryText, 
                    stickers: selectedStickers, // 心情日記同時紀錄選取之自訂與內建貼紙
                    timestamp: Date.now()
                });
                setDiaryText(''); 
                setSelectedStickers([]);
                setView('history');
            };

            const exportTxt = () => {
                const content = records.sort((a,b) => b.timestamp - a.timestamp).map(r => {
                    const stickerStr = r.stickers && r.stickers.length > 0 
                        ? `\n貼圖: ${r.stickers.map(s => s.type === 'emoji' ? s.char : '[自訂相片貼紙]').join(' ')}` 
                        : '';
                    return `時間: ${new Date(r.timestamp).toLocaleString()}\n心情: ${r.score} (${r.text})\n日記: ${r.diary || "無日記內容"}${stickerStr}\n---`;
                }).join('\n\n');
                const link = document.createElement('a');
                link.href = URL.createObjectURL(new Blob([content], { type: 'text/plain;charset=utf-8' }));
                link.download = "媽咪心情日記.txt"; link.click();
            };

            // --- 串接 Gemini 聊天服務 ---
            const callGemini = async (prompt) => {
                const apiKey = "";
                const maxRetries = 5;
                let delay = 1000;

                for (let i = 0; i < maxRetries; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: "妳是一位溫柔、有耐心的孕期心理諮詢顧問。請用溫暖的口氣安慰並鼓勵媽咪。字數保持在 150 字以內。" }] }
                            })
                        });
                        if (!response.ok) throw new Error("API 響應錯誤");
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text || "媽咪，我一直在這，慢慢說，我聽著呢。";
                    } catch (err) {
                        if (i === maxRetries - 1) throw err;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const sendMessage = async () => {
                if (!inputMessage.trim()) return;
                const userMsg = inputMessage;
                setInputMessage('');
                setChatMessages(p => [...p, { role: 'user', text: userMsg }]);
                setIsTyping(true);

                try {
                    const aiResponse = await callGemini(`目前的媽咪心情分數是 ${moodScore}/100。媽咪說：${userMsg}`);
                    setChatMessages(p => [...p, { role: 'assistant', text: aiResponse }]);
                } catch (e) {
                    setChatMessages(p => [...p, { role: 'assistant', text: '抱歉，我的連線好像有點不穩定，但我一直都在這裡陪妳喔。' }]);
                } finally {
                    setIsTyping(false);
                }
            };

            const generateCalendarDays = () => {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const days = [];
                const total = new Date(year, month + 1, 0).getDate();
                const start = new Date(year, month, 1).getDay();
                for (let i = 0; i < start; i++) days.push(null);
                for (let i = 1; i <= total; i++) days.push(new Date(year, month, i));
                return days;
            };

            const tutorialSlides = [
                { title: "歡迎來到妳的避風港 💖", desc: "親愛的媽咪，讓我們陪妳度過這段奇妙的旅程。", icon: "heart" },
                { title: "心情溫度計 🌡️", desc: "每天滑動溫度計記錄情緒，點選「儲存紀錄」留下足跡。", icon: "thermometer" },
                { title: "暖心與自訂貼圖 🧸", desc: "日記中可以加入我們精選的實體貼紙效果圖示，甚至可以上傳超音波照片做成雲端專屬貼圖，完全不佔手機空間喔！", icon: "smile" },
                { title: "今日心情快篩 📝", desc: "首頁上方的卡片可以進行快速自我檢測。", icon: "check" },
                { title: "日曆回顧與補寫 📅", desc: "點擊日期查看紀錄。若那天沒記，點選後點擊「補寫」即可補填。", icon: "edit" },
                { title: "Gemini 溫柔陪伴 ✨", desc: "任何想傾訴的時候，點擊右下角對話泡泡，Gemini 會一直傾聽。", icon: "message" }
            ];

            if (!isInit) return <div className="min-h-screen flex items-center justify-center bg-pink-50 text-pink-500 font-bold">開啟您的溫馨空間...</div>;

            return (
                <div className="min-h-screen p-4 flex flex-col items-center select-none relative">
                    
                    {/* 說明欄 Overlay */}
                    {showTutorial && (
                        <div className="tutorial-overlay">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-10 flex flex-col items-center border-4 border-pink-100 animate-in zoom-in-95">
                                <div className="mb-6 p-6 bg-pink-50 rounded-full text-pink-500">
                                    <Icon name={tutorialSlides[tutorialStep].icon} size={48} />
                                </div>

                                    <button onClick={() => { setEditingRecord(null); setSelectedStickers([]); }} className="p-2 hover:bg-slate-100 rounded-full active:scale-90 transition-all text-slate-400"><Icon name="x" size={20}/></button>
                                </div>
                                <div className="flex items-center gap-4 mb-4 bg-slate-50 p-6 rounded-[2rem] border border-slate-100 shadow-inner">
                                    <canvas ref={canvasRef} width={60} height={170} />
                                    <div className="flex-1 space-y-4">
                                        <p className="text-xs font-bold" style={{ color: getMoodColor(editingRecord.score) }}>{getMoodText(editingRecord.score)} ({editingRecord.score})</p>
                                        <input type="range" min="0" max="100" value={editingRecord.score} onChange={e => setEditingRecord({...editingRecord, score: parseInt(e.target.value)})} className="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500" />
                                    </div>
                                </div>

                                {/* 編輯紀錄時的貼圖管理 */}
                                <div className="mb-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-xs font-bold text-slate-400">管理貼圖</span>
                                        <button onClick={() => setShowStickerPicker(true)} className="flex items-center gap-1 text-xs text-pink-500 bg-pink-50 px-2 py-1 rounded-full font-bold">
                                            <Icon name="smile" size={12} /> 新增/變更
                                        </button>
                                    </div>
                                    {selectedStickers.length > 0 && (
                                        <div className="flex gap-2 p-2 bg-pink-50/50 rounded-xl items-center flex-wrap">
                                            {selectedStickers.map((s, idx) => (
                                                <div key={idx} className="relative group">
                                                    {s.type === 'emoji' ? (
                                                        <span className="sticker-effect inline-block text-2xl select-none">{s.char}</span>
                                                    ) : (
                                                        <img src={s.char} className="sticker-effect w-8 h-8 object-contain rounded-md" />
                                                    )}
                                                    <button onClick={() => handleRemoveSelectedSticker(idx)} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5 shadow">
                                                        <Icon name="x" size={8} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <textarea value={editingRecord.diary} onChange={e => setEditingRecord({...editingRecord, diary: e.target.value})} className="flex-grow bg-slate-50 rounded-3xl p-5 text-sm outline-none resize-none mb-6 border border-slate-100 shadow-inner" />
                                <button onClick={() => { 
                                    const { db, appId, updateDoc, doc } = window.FirebaseServices;
                                    updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'mood_history', editingRecord.id), { 
                                        score: editingRecord.score, 
                                        text: getMoodText(editingRecord.score), 
                                        diary: editingRecord.diary,
                                        stickers: selectedStickers // 更新貼圖
                                    }); 
                                    setEditingRecord(null); 
                                    setSelectedStickers([]);
                                }} className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold shadow-xl flex items-center justify-center gap-2 active:scale-95">
                                    <Icon name="save" size={18}/> 儲存更新
                                </button>
                            </div>
                        )}

                        {/* STICKER PICKER MODAL */}
                        {showStickerPicker && (
                            <div className="absolute inset-x-0 bottom-0 bg-white rounded-t-[2.5rem] shadow-2xl border-t border-pink-100 p-6 z-[200] animate-in slide-in-from-bottom duration-300 max-h-[360px] flex flex-col">
                                <div className="flex justify-between items-center mb-4">
                                    <h4 className="font-bold text-pink-600 flex items-center gap-2">🧸 選擇貼圖</h4>
                                    <button onClick={() => setShowStickerPicker(false)} className="p-2 hover:bg-slate-100 rounded-full">
                                        <Icon name="x" size={18} className="text-slate-400" />
                                    </button>
                                </div>

                                {/* Tab 切換 */}
                                <div className="flex border-b border-pink-50 mb-4 text-xs font-bold">
                                    <button onClick={() => setActiveStickerTab('builtin')} className={`flex-1 pb-3 text-center transition-all ${activeStickerTab === 'builtin' ? 'border-b-2 border-pink-500 text-pink-500' : 'text-slate-400'}`}>
                                        內建暖心貼圖
                                    </button>
                                    <button onClick={() => setActiveStickerTab('custom')} className={`flex-1 pb-3 text-center transition-all ${activeStickerTab === 'custom' ? 'border-b-2 border-pink-500 text-pink-500' : 'text-slate-400'}`}>
                                        雲端自訂貼圖 ({customStickers.length})
                                    </button>
                                </div>

                                {/* 貼圖展示區域 */}
                                <div className="flex-grow overflow-y-auto custom-scrollbar pb-4">
                                    {activeStickerTab === 'builtin' && (
                                        <div className="grid grid-cols-5 gap-4 justify-items-center">
                                            {BUILTIN_STICKERS.map((stk) => (
                                                <button key={stk.id} onClick={() => handleAddSticker(stk)} className="text-4xl sticker-effect select-none p-1 focus:outline-none animate-in zoom-in-50">
                                                    {stk.char}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {activeStickerTab === 'custom' && (
                                        <div className="grid grid-cols-4 gap-4 justify-items-center items-center">
                                            {/* 上傳按鈕 */}
                                            <button onClick={() => fileInputRef.current.click()} className="w-16 h-16 rounded-2xl border-2 border-dashed border-pink-200 hover:border-pink-400 text-pink-400 flex items-center justify-center transition-colors active:scale-95" title="上傳照片做成貼圖">
                                                <Icon name="plus" size={28} />
                                            </button>
                                            <input type="file" ref={fileInputRef} onChange={handleCustomStickerUpload} accept="image/*" className="hidden" />

                                            {/* 已上傳貼圖 (雲端同步) */}
                                            {customStickers.map((stk) => (
                                                <div key={stk.id} className="relative group w-16 h-16 animate-in fade-in zoom-in-75">
                                                    {/* 點擊主圖為選擇貼圖 */}
                                                    <img 
                                                        src={stk.char} 
                                                        onClick={() => handleAddSticker(stk)}
                                                        className="w-full h-full object-contain rounded-xl border border-slate-100 sticker-effect cursor-pointer" 
                                                    />
                                                    {/* 打叉：點擊會啟動高質感的自訂刪除彈窗，並使用 stopPropagation 阻止氣泡觸發 handleAddSticker */}
                                                    <button 
                                                        onClick={(e) => { 
                                                            e.stopPropagation();
                                                            e.preventDefault();
                                                            setStickerToDelete(stk); 
                                                        }} 
                                                        className="absolute -top-1.5 -right-1.5 bg-rose-500 hover:bg-rose-600 text-white rounded-full shadow-md transition-all active:scale-75 z-[210] w-5 h-5 flex items-center justify-center"
                                                        title="自雲端永久刪除貼圖"
                                                    >
                                                        <Icon name="x" size={10} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <footer className="mt-4 text-[9px] text-slate-300 font-bold uppercase tracking-[0.2em] px-4 text-center">© 2024 MOMMY'S MOOD HARBOR ・ 給媽咪最溫柔的記憶足跡</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
