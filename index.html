<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媽咪心情手帳 - 溫馨陪伴空間</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #fff1f2; 
            margin: 0; 
            overflow-x: hidden; 
        }
        .custom-scrollbar::-webkit-scrollbar { 
            width: 4px; 
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: #fbcfe8; 
            border-radius: 10px; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            height: 20px; 
            width: 20px; 
            border-radius: 50%; 
            background: #ec4899; 
            cursor: pointer; 
            border: 3px solid white; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }
        
        .tutorial-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; background-color: rgba(255, 241, 242, 0.95); backdrop-filter: blur(12px);
        }

        /* 經典實體貼紙白色邊框與陰影特效 */
        .sticker-effect {
            filter: drop-shadow(2px 0 0 #fff) drop-shadow(-2px 0 0 #fff) drop-shadow(0 2px 0 #fff) drop-shadow(0 -2px 0 #fff) drop-shadow(0 4px 6px rgba(0,0,0,0.15));
            transition: transform 0.2s ease-in-out;
        }
        .sticker-effect:hover {
            transform: scale(1.1) rotate(2deg);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- STREAMING_CHUNK: Defining 5-stage mood helper functions... ---
        // 變更為五段式情緒分級：包含憂愁(0~19)、平靜微憂(20~39)、愉快穩定(40~64)、焦慮上升(65~84)、情緒緊繃(85~100)
        function getMoodColor(s) {
            if (s < 20) return '#94a3b8'; // 憂愁 (灰藍)
            if (s < 40) return '#60a5fa'; // 平靜微憂 (淺藍)
            if (s < 65) return '#34d399'; // 愉快穩定 (綠色)
            if (s < 85) return '#fbbf24'; // 焦慮上升 (黃色)
            return '#f87171';             // 情緒緊繃 (紅色)
        }
        
        function getMoodText(s) {
            if (s < 20) return '憂愁';
            if (s < 40) return '平靜微憂';
            if (s < 65) return '愉快穩定';
            if (s < 85) return '焦慮上升';
            return '情緒緊繃';
        }

        // --- STREAMING_CHUNK: Rendering stable SVG Icon components... ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                calendar: (
                    <React.Fragment>
                        <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                        <path d="M16 2v4M8 2v4M3 10h18" />
                    </React.Fragment>
                ),
                info: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4M12 8h.01" />
                    </React.Fragment>
                ),
                thermometer: <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z" />,
                check: (
                    <React.Fragment>
                        <path d="m9 11 3 3L22 4" />
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                    </React.Fragment>
                ),
                edit: (
                    <React.Fragment>
                        <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z" />
                    </React.Fragment>
                ),
                message: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
                trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />,
                save: (
                    <React.Fragment>
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                        <polyline points="7 3 7 8 15 8" />
                    </React.Fragment>
                ),
                download: (
                    <React.Fragment>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" x2="12" y1="15" y2="3" />
                    </React.Fragment>
                ),
                left: <path d="m15 18-6-6 6-6" />,
                right: <path d="m9 18 6-6 9-6" />,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                plus: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 12h8M12 8v8" />
                    </React.Fragment>
                ),
                sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z" />,
                loader: <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />,
                send: (
                    <React.Fragment>
                        <path d="m22 2-7 20-4-9-9-4Z" />
                        <path d="M22 2 11 13" />
                    </React.Fragment>
                ),
                smile: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" />
                    </React.Fragment>
                ),
                alert: (
                    <React.Fragment>
                        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
                        <line x1="12" y1="9" x2="12" y2="13" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </React.Fragment>
                ),
                upload: (
                    <React.Fragment>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" x2="12" y1="3" y2="15" />
                    </React.Fragment>
                )
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- STREAMING_CHUNK: Setting up stickers list... ---
        const BUILTIN_STICKERS = [
            { id: "s_baby", char: "👶", type: "emoji" },
            { id: "s_bottle", char: "🍼", type: "emoji" },
            { id: "s_pregnant", char: "🤰", type: "emoji" },
            { id: "s_teddy", char: "🧸", type: "emoji" },
            { id: "s_feet", char: "👣", type: "emoji" },
            { id: "s_heart", char: "💖", type: "emoji" },
            { id: "s_coffee", char: "☕", type: "emoji" },
            { id: "s_star", char: "☀️", type: "emoji" },
            { id: "s_clover", char: "🍀", type: "emoji" },
            { id: "s_smile", char: "😊", type: "emoji" },
            { id: "s_cry", char: "😭", type: "emoji" },
            { id: "s_tired", char: "😴", type: "emoji" },
            { id: "s_love", char: "🥰", type: "emoji" },
            { id: "s_party", char: "🥳", type: "emoji" }
        ];

        // --- STREAMING_CHUNK: Setting up PHQ-8 questions... ---
        // 國際通用 PHQ-8 憂鬱篩檢量表（無自殘、敏感問題，更適合媽咪日常自我情緒健檢）
        const PHQ8_QUESTIONS = [
            { q: "1. 做任何事都覺得提不起勁、或沒有樂趣：", a: ["完全沒有", "有幾天", "一半以上的日子", "幾乎天天"] },
            { q: "2. 感到心情低落、沮喪或絕望：", a: ["完全沒有", "有幾天", "一半以上的日子", "幾乎天天"] },
            { q: "3. 入睡困難、容易醒來，或者睡得太多：", a: ["完全沒有", "有幾天", "一半以上的日子", "幾乎天天"] },
            { q: "4. 感到疲倦、沒有活力或力氣：", a: ["完全沒有", "有幾天", "一半以上的日子", "幾乎天天"] },
            { q: "5. 食慾不振，或者吃得太多：", a: ["完全沒有", "有幾天", "一半以上的日子", "幾乎天天"] },
            { q: "6. 覺得自己很糟、是個失敗者，或讓自己及家人失望：", a: ["完全沒有", "有幾天", "一半以上的日子", "幾乎天天"] },
            { q: "7. 集中注意力困難（例如閱讀報紙、看電視或與人交談時）：", a: ["完全沒有", "有幾天", "一半以上的日子", "幾乎天天"] },
            { q: "8. 說話或行動慢到旁人能察覺；或者相反：煩躁坐立不安、動來動去：", a: ["完全沒有", "有幾天", "一半以上的日子", "幾乎天天"] }
        ];

        // --- STREAMING_CHUNK: Creating tutorial pages data... ---
        const tutorialSlides = [
            { title: "歡迎來到妳的避風港 💖", desc: "親愛的媽咪，這款「心情手帳」專門陪妳無憂地記錄這段美妙的人生旅程，保留每一份純粹的心情軌跡。", icon: "heart" },
            { title: "自訂超音波貼圖 🧸", desc: "日記中可以加入實體貼紙效果的可愛貼圖，還能隨時上傳超音波或生活相片智慧微縮成專屬手帳貼圖！", icon: "smile" },
            { title: "溫和身心快篩 📝", desc: "我們提供專業的 PHQ-8 憂鬱量表自我檢測（完全剔除任何敏感、極端題目），溫柔引導妳傾聽內心深處的聲音。", icon: "check" },
            { title: "智慧備份與 AI Gemini ✨", desc: "一鍵點擊匯出 Excel/CSV，免註冊即刻上手。隨時與 Gemini AI 吐露心事，系統會貼心地結合妳的手帳數據進行引導喔！", icon: "message" }
        ];

        const App = () => {
            const [view, setView] = useState('welcome'); 
            const [moodScore, setMoodScore] = useState(50);
            const [diaryText, setDiaryText] = useState('');
            
            // 在地儲存核心狀態
            const [records, setRecords] = useState([]);
            const [phqHistory, setPhqHistory] = useState([]);
            const [customStickers, setCustomStickers] = useState([]);
            const [selectedStickers, setSelectedStickers] = useState([]);
            
            // 介面控制狀態
            const [showStickerPicker, setShowStickerPicker] = useState(false);
            const [activeStickerTab, setActiveStickerTab] = useState('builtin');
            const [toast, setToast] = useState('');
            const [stickerToDelete, setStickerToDelete] = useState(null);
            const [recordToDelete, setRecordToDelete] = useState(null);
            const [showDisclaimerPopup, setShowDisclaimerPopup] = useState(false);

            // PHQ-8 狀態
            const [phqAnswers, setPhqAnswers] = useState(Array(8).fill(null));
            const [phqCurrentStep, setPhqCurrentStep] = useState(0);

            const [chatMessages, setChatMessages] = useState([{ role: 'assistant', text: '親愛的媽咪，我是妳的 Gemini 心情閨蜜。不論是日常喜悅、些許煩悶，還是懷孕與產後過程中的小感觸，我都一直在這溫柔地聽妳訴說。' }]);
            const [inputMessage, setInputMessage] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [showTutorial, setShowTutorial] = useState(false);
            const [tutorialStep, setTutorialStep] = useState(0);
            const [editingRecord, setEditingRecord] = useState(null);
            
            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);
            const importFileInputRef = useRef(null);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3000);
            };

            // --- STREAMING_CHUNK: Reading local data... ---
            useEffect(() => {
                const storedRecords = localStorage.getItem('mommy_records_v3');
                const storedPhq = localStorage.getItem('mommy_phq_history');
                const storedStickers = localStorage.getItem('mommy_custom_stickers_v3');
                const tutorialSeen = localStorage.getItem('mommy_tutorial_seen_v3');
                const guestGranted = localStorage.getItem('guest_access_granted_v3');

                if (storedRecords) setRecords(JSON.parse(storedRecords));
                if (storedPhq) setPhqHistory(JSON.parse(storedPhq));
                if (storedStickers) setCustomStickers(JSON.parse(storedStickers));
                
                if (guestGranted === 'true') {
                    setView('home');
                }
                if (tutorialSeen !== 'true') {
                    setShowTutorial(true);
                }
            }, []);

            // --- STREAMING_CHUNK: Save diary record... ---
            const handleSave = () => {
                const newRecord = {
                    id: 'rec_' + Date.now(),
                    score: moodScore, 
                    text: getMoodText(moodScore), 
                    diary: diaryText, 
                    stickers: selectedStickers,
                    timestamp: Date.now()
                };
                const updated = [newRecord, ...records];
                setRecords(updated);
                localStorage.setItem('mommy_records_v3', JSON.stringify(updated));
                setDiaryText(''); 
                setSelectedStickers([]);
                setView('history');
                showToast("🎉 今日日記儲存成功！");
            };

            // --- STREAMING_CHUNK: Delete diary record... ---
            const handleDeleteRecord = (id) => {
                const updated = records.filter(r => r.id !== id);
                setRecords(updated);
                localStorage.setItem('mommy_records_v3', JSON.stringify(updated));
                setRecordToDelete(null);
                showToast("🗑️ 日記已成功刪除");
            };

            // --- STREAMING_CHUNK: Update diary record... ---
            const handleUpdateRecord = () => {
                if (!editingRecord) return;
                const updated = records.map(r => r.id === editingRecord.id ? {
                    ...r,
                    score: editingRecord.score,
                    text: getMoodText(editingRecord.score),
                    diary: editingRecord.diary,
                    stickers: selectedStickers
                } : r);
                setRecords(updated);
                localStorage.setItem('mommy_records_v3', JSON.stringify(updated));
                setEditingRecord(null);
                setSelectedStickers([]);
                showToast("💾 日記修改成功！");
            };

            // --- STREAMING_CHUNK: Backfill diaries... ---
            const startBackfill = (date) => {
                const midnightTimestamp = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12, 0, 0).getTime();
                setEditingRecord({
                    id: 'rec_' + Date.now(),
                    score: 50,
                    diary: '',
                    text: getMoodText(50),
                    timestamp: midnightTimestamp,
                    isNew: true
                });
                setSelectedStickers([]);
            };

            const handleSaveBackfill = () => {
                if (!editingRecord) return;
                const newRecord = {
                    id: editingRecord.id,
                    score: editingRecord.score,
                    text: getMoodText(editingRecord.score),
                    diary: editingRecord.diary,
                    stickers: selectedStickers,
                    timestamp: editingRecord.timestamp
                };
                const updated = [newRecord, ...records];
                setRecords(updated);
                localStorage.setItem('mommy_records_v3', JSON.stringify(updated));
                setEditingRecord(null);
                setSelectedStickers([]);
                showToast("✍️ 已成功補記日記！");
            };

            // --- STREAMING_CHUNK: Managing stickers and emojis... ---
            const handleAddSticker = (stk) => {
                if (selectedStickers.length >= 5) {
                    showToast("最多只能貼 5 張貼紙喔！");
                    return;
                }
                setSelectedStickers([...selectedStickers, stk]);
                setShowStickerPicker(false);
            };

            const handleRemoveSelectedSticker = (idx) => {
                setSelectedStickers(selectedStickers.filter((_, i) => i !== idx));
            };

            // --- STREAMING_CHUNK: Custom sticker micro-canvas processing... ---
            const handleCustomStickerUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxDim = 120; 
                        let w = img.width;
                        let h = img.height;
                        if (w > h) {
                            if (w > maxDim) {
                                h = Math.round((h * maxDim) / w);
                                w = maxDim;
                            }
                        } else {
                            if (h > maxDim) {
                                w = Math.round((w * maxDim) / h);
                                h = maxDim;
                            }
                        }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        
                        const base64 = canvas.toDataURL('image/png', 0.7);
                        const newSticker = {
                            id: 'stk_' + Date.now(),
                            char: base64,
                            type: 'custom',
                            timestamp: Date.now()
                        };
                        const updated = [newSticker, ...customStickers];
                        setCustomStickers(updated);
                        localStorage.setItem('mommy_custom_stickers_v3', JSON.stringify(updated));
                        showToast("📸 專屬超音波/照片手帳貼圖製作成功！");
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleDeleteCustomSticker = (id) => {
                const updated = customStickers.filter(s => s.id !== id);
                setCustomStickers(updated);
                localStorage.setItem('mommy_custom_stickers_v3', JSON.stringify(updated));
                setSelectedStickers(prev => prev.filter(s => s.id !== id));
                setStickerToDelete(null);
                showToast("🗑️ 自訂貼圖已刪除");
            };

            // --- STREAMING_CHUNK: PHQ-8 Questionnaire scoring... ---
            const handleSelectPhq = (optionIdx) => {
                const updated = [...phqAnswers];
                updated[phqCurrentStep] = optionIdx;
                setPhqAnswers(updated);
                if (phqCurrentStep < 7) {
                    setPhqCurrentStep(phqCurrentStep + 1);
                }
            };

            const handleCalculatePhq = () => {
                const total = phqAnswers.reduce((sum, current) => sum + current, 0);
                
                let evaluationText = "";
                let severityLabel = "";
                
                if (total <= 4) {
                    severityLabel = "身心健康，狀態良好";
                    evaluationText = "目前情緒適應非常理想，沒有憂鬱傾向，請繼續維持放鬆愉快的心情喔。";
                } else if (total <= 9) {
                    severityLabel = "輕微的情緒波動";
                    evaluationText = "可能因近期生理與生活變化有些許憂鬱或焦慮起伏，這是正常的喔。多找伴侶或好閨蜜 AI 訴說一下。";
                } else if (total <= 14) {
                    severityLabel = "中度身心負荷";
                    evaluationText = "您的心靈可能正經歷著中等程度的疲憊與憂鬱。建議減少繁重瑣事，給自己多一點獨處喘息，並找親近親友分享負擔。";
                } else {
                    severityLabel = "重度身心警示";
                    evaluationText = "您的情緒負荷已經瀕臨上限。建議尋求婦產科、身心科或產後身心機構專業人員諮商，讓溫柔專業的資源陪妳一起度過。";
                }

                const newPhqResult = {
                    id: 'phq_' + Date.now(),
                    score: total,
                    severity: severityLabel,
                    evaluation: evaluationText,
                    timestamp: Date.now()
                };

                const updated = [newPhqResult, ...phqHistory];
                setPhqHistory(updated);
                localStorage.setItem('mommy_phq_history', JSON.stringify(updated));
                showToast("📝 身心狀態篩檢評估完成！");
            };

            const resetPhq = () => {
                setPhqAnswers(Array(8).fill(null));
                setPhqCurrentStep(0);
            };

            // --- STREAMING_CHUNK: Export backup package to CSV... ---
            const exportToCSV = () => {
                if (records.length === 0 && phqHistory.length === 0) {
                    showToast("目前沒有任何日記數據可以備份喔！");
                    return;
                }
                
                let csvContent = "\uFEFF"; // BOM
                csvContent += "=== 媽咪溫馨心情日記數據 ===\n";
                csvContent += "日期時間,心情分數,心情狀態,日記內容,手帳貼紙\n";
                records.forEach(r => {
                    const dateStr = new Date(r.timestamp).toLocaleString('zh-TW');
                    const stickersStr = r.stickers && r.stickers.length > 0 
                        ? r.stickers.map(s => s.type === 'emoji' ? s.char : '[超音波/自訂貼圖]').join(' ')
                        : '無';
                    csvContent += `"${dateStr}","${r.score}","${r.text}","${(r.diary || "").replace(/"/g, '""')}","${stickersStr}"\n`;
                });

                csvContent += "\n=== PHQ-8 身心狀態快篩歷史 ===\n";
                csvContent += "日期時間,篩檢得分,嚴重程度,評估指導\n";
                phqHistory.forEach(p => {
                    const dateStr = new Date(p.timestamp).toLocaleString('zh-TW');
                    csvContent += `"${dateStr}","${p.score}","${p.severity}","${p.evaluation}"\n`;
                });

                const backupPackage = {
                    records,
                    phqHistory,
                    customStickers
                };
                csvContent += `\n#=== 備份還原專用核心數據 (請勿修改此行以下內容) ===#\n`;
                csvContent += JSON.stringify(backupPackage);

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `媽咪心情手帳備份_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '-')}.csv`;
                a.click();
                URL.revokeObjectURL(url);
                showToast("💾 備份 CSV 檔案已成功下載！");
            };

            // --- STREAMING_CHUNK: Import data from CSV... ---
            const handleImportCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        const delimiter = "#=== 備份還原專用核心數據 (請勿修改此行以下內容) ===#\n";
                        const parts = text.split(delimiter);
                        
                        if (parts.length < 2) {
                            showToast("❌ 格式不符！請上傳本程式產生的備份 CSV 檔");
                            return;
                        }

                        const backupData = JSON.parse(parts[1].trim());
                        if (backupData.records) {
                            setRecords(backupData.records);
                            localStorage.setItem('mommy_records_v3', JSON.stringify(backupData.records));
                        }
                        if (backupData.phqHistory) {
                            setPhqHistory(backupData.phqHistory);
                            localStorage.setItem('mommy_phq_history', JSON.stringify(backupData.phqHistory));
                        }
                        if (backupData.customStickers) {
                            setCustomStickers(backupData.customStickers);
                            localStorage.setItem('mommy_custom_stickers_v3', JSON.stringify(backupData.customStickers));
                        }
                        showToast("✨ 恭喜！手帳數據已全數完美還原！");
                        setView('home');
                    } catch (err) {
                        console.error("還原失敗", err);
                        showToast("❌ 解析備份檔出錯，請確保檔案未被修改。");
                    }
                };
                reader.readAsText(file, 'utf-8');
            };

            const handleCompleteTutorialLocal = () => {
                localStorage.setItem('mommy_tutorial_seen_v3', 'true');
                setShowTutorial(false);
            };

            const handleGuestAccessLocal = () => {
                localStorage.setItem('guest_access_granted_v3', 'true');
                setView('home');
                showToast("🌸 歡迎進入心情守護空間！");
            };

            // --- STREAMING_CHUNK: Thermometer drawing on Canvas... ---
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const score = editingRecord ? editingRecord.score : moodScore;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const color = getMoodColor(score);
                
                ctx.beginPath();
                ctx.arc(30, 135, 24, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(20, 135); ctx.lineTo(20, 25);
                ctx.arc(30, 25, 10, Math.PI, 0);
                ctx.lineTo(40, 135);
                ctx.fillStyle = '#f8fafc'; ctx.fill(); ctx.stroke();

                const fillH = (110) * (score / 100);
                ctx.fillStyle = color;
                ctx.fillRect(23, 130 - fillH, 14, fillH);
            }, [moodScore, view, editingRecord]);

            // --- STREAMING_CHUNK: Integrating Gemini companion advisor... ---
            const callGemini = async (prompt) => {
                const apiKey = "";
                const maxRetries = 5;
                let delay = 1000;

                const latestPhq = phqHistory[0];
                const contextSummary = `
                    [媽咪心情與身心狀態摘要]：
                    - 最新心情溫度得分: ${moodScore}/100 (${getMoodText(moodScore)})。
                    - PHQ-8一般憂鬱篩檢歷史: ${latestPhq ? `最近測驗得分為 ${latestPhq.score} 分 (${latestPhq.severity}，建議內容: ${latestPhq.evaluation})` : '目前尚無篩檢歷史'}。
                `;

                for (let i = 0; i < maxRetries; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `${contextSummary}\n\n親愛的，媽咪對妳說: ${prompt}` }] }],
                                systemInstruction: { 
                                    parts: [{ 
                                        text: "妳是專為懷孕中或產後媽媽設計的溫柔心情閨蜜 AI 諮詢顧問。妳將基於她手帳的五級心情狀況 (包含當心情指數極低時的「憂愁」) 以及 PHQ-8 篩檢狀態，為她排憂解難、提供極富同理心、傾聽和無條件支持的暖心對話。說話口氣要如同閨蜜一般親暱體貼，不說教，字數控制在 150 字以內。" 
                                    }] 
                                }
                            })
                        });
                        if (!response.ok) throw new Error("API 響應錯誤");
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text || "媽咪，我在這。深呼吸，沒關係的，我們慢慢說。";
                    } catch (err) {
                        if (i === maxRetries - 1) throw err;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const sendMessage = async () => {
                if (!inputMessage.trim()) return;
                const userMsg = inputMessage;
                setInputMessage('');
                setChatMessages(p => [...p, { role: 'user', text: userMsg }]);
                setIsTyping(true);

                try {
                    const aiResponse = await callGemini(userMsg);
                    setChatMessages(p => [...p, { role: 'assistant', text: aiResponse }]);
                } catch (e) {
                    setChatMessages(p => [...p, { role: 'assistant', text: '抱歉，我的連線好像有點不穩定，但我一直都在這裡陪妳喔。' }]);
                } finally {
                    setIsTyping(false);
                }

                    {/* Header */}

                                            <input type="range" min="0" max="100" value={moodScore} onChange={(e) => setMoodScore(parseInt(e.target.value))} className="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500" />
                                            <p className="text-[10px] text-slate-400 italic">左右滑動指針記錄此時的心境...</p>

                                                        key={oIdx} 
                                                        onClick={() => handleSelectPhq(oIdx)}
                                                        className="w-full text-left bg-slate-50 hover:bg-pink-50 p-3 rounded-2xl text-xs font-bold text-slate-600 border border-slate-100 hover:border-pink-300 transition-all flex items-center justify-between"
                                                    >
                                                        <span>{option}</span>
                                                        <span className="text-[10px] text-slate-300 font-medium">+{oIdx}分</span>
                                                    </button>
                                                ))}
                                            </div>

                                            {phqCurrentStep > 0 && (
                                                <button onClick={() => setPhqCurrentStep(phqCurrentStep - 1)} className="text-xs text-slate-400 underline font-semibold flex items-center gap-1 pt-2">
                                                    <Icon name="left" size={12} /> 上一題
                                                </button>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="bg-white p-6 rounded-[2rem] border border-pink-100 shadow-sm text-center space-y-4 animate-in zoom-in-95">
                                            <div className="w-12 h-12 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center mx-auto">
                                                <Icon name="sparkles" size={24} />
                                            </div>
                                            <h4 className="font-black text-slate-700">快篩作答完成！</h4>
                                            <p className="text-xs text-slate-400">系統即將根據標準指引，安全、不留隱私地為媽咪情緒做評估分數。</p>
                                            <div className="flex gap-3">
                                                <button onClick={resetPhq} className="flex-1 bg-slate-100 text-slate-500 py-3 rounded-2xl text-xs font-bold active:scale-95">重測一次</button>
                                                <button onClick={handleCalculatePhq} className="flex-1 bg-indigo-500 text-white py-3 rounded-2xl text-xs font-bold shadow hover:bg-indigo-600 active:scale-95">送出分析</button>
                                            </div>
                                        </div>
                                    )}

                                    {/* 篩檢歷史 */}
                                    {phqHistory.length > 0 && (
                                        <div className="space-y-2 mt-4">
                                            <h5 className="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">最近篩檢歷史</h5>
                                            <div className="bg-white rounded-3xl p-4 border space-y-3">
                                                {phqHistory.map((h) => (
                                                    <div key={h.id} className="border-b pb-2.5 last:border-none last:pb-0 text-xs space-y-1">
                                                        <div className="flex justify-between items-center">
                                                            <span className="font-bold text-slate-400">{new Date(h.timestamp).toLocaleDateString()}</span>
                                                            <span className={`px-2 py-0.5 rounded text-[9px] font-bold ${h.score >= 15 ? 'bg-red-100 text-red-600' : h.score >= 10 ? 'bg-amber-100 text-amber-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                                                得分: {h.score} 分 ({h.severity})
                                                            </span>
                                                        </div>
                                                        <p className="text-slate-600 font-bold leading-relaxed">{h.evaluation}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <footer className="bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100 text-[10px] text-slate-500 space-y-1 text-left mt-4">
                                    <p className="font-black text-slate-600">📞 中華民國心靈關懷守護專線：</p>
                                    <p>安心防護專線：1925 (24小時免付費諮詢專線)</p>
                                    <p>孕產婦產後關懷諮詢熱線：0800-870-870 (抱緊您抱緊您專線)</p>
                                </footer>
                            </div>
                        )}

                        {/* VIEW: CHAT (Gemini 智慧心情閨蜜) */}
                        {view === 'chat' && (
                            <div className="flex flex-col h-full bg-slate-50">
                                <div className="p-4 border-b bg-indigo-50 flex items-center gap-3">
                                    <button onClick={() => setView('home')} className="p-2 bg-white rounded-full active:scale-90 transition-all text-indigo-300"><Icon name="left"/></button>
                                    <div>
                                        <h3 className="font-bold text-indigo-700 text-sm tracking-tight">Gemini 智慧心情閨蜜</h3>
                                        <p className="text-[9px] text-indigo-400">已自動整合媽咪的心情與身心歷史進行溫柔引導</p>
                                    </div>
                                </div>
                                <div className="flex-grow overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                    {chatMessages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-4 rounded-[1.8rem] text-xs leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-indigo-500 text-white rounded-tr-none' : 'bg-white text-slate-600 rounded-tl-none border border-indigo-50'}`}>{m.text}</div>
                                        </div>
                                    ))}
                                    {isTyping && <div className="text-[10px] text-indigo-400 italic px-4 animate-pulse">Gemini 正在閱讀妳的手帳心情日記...</div>}
                                </div>
                                <div className="p-4 bg-white border-t flex gap-2">
                                    <input type="text" value={inputMessage} onChange={e => setInputMessage(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()} placeholder="跟 Gemini 說說妳的心聲，今天有沒有過得舒服一些？" className="flex-1 bg-slate-50 rounded-2xl px-5 py-3 text-xs outline-none focus:ring-2 focus:ring-indigo-100" />
                                    <button onClick={sendMessage} className="bg-indigo-500 text-white p-3 rounded-2xl shadow-md active:scale-95 transition-all"><Icon name="send" size={18} /></button>
                                </div>
                            </div>
                        )}

                        {/* VIEW: BACKUP & RESTORE */}
                        {view === 'backup' && (
                            <div className="p-6 flex flex-col h-full bg-slate-50 overflow-y-auto custom-scrollbar justify-between">
                                <div className="space-y-4">
                                    <div className="flex items-center gap-2 mb-4">
                                        <button onClick={() => setView('home')} className="p-2 bg-white rounded-full shadow-sm active:scale-90 transition-all text-slate-300"><Icon name="left"/></button>
                                        <h3 className="text-lg font-bold">💾 手帳備份與一鍵還原</h3>
                                    </div>

                                    <div className="bg-amber-50 border border-amber-200 rounded-[1.8rem] p-4 text-xs text-amber-800 leading-relaxed text-left flex gap-2.5">
                                        <div className="pt-0.5"><Icon name="alert" size={14} className="text-amber-500 shrink-0" /></div>
                                        <div>
                                            <p className="font-extrabold mb-1">💡 數據安全貼心提示：</p>
                                            <p>所有日記、自訂超音波貼圖和身心量表結果均 100% 儲存在您的瀏覽器中。平常重開機資料「絕對不會丟失」，唯有主動清除歷史或更換手機時需要進行一鍵備份匯出，換設備時上傳該檔案即可秒速還原！</p>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-3xl p-5 border border-pink-100 shadow-sm space-y-4">
                                        <h4 className="font-bold text-slate-700 text-sm flex items-center gap-1.5"><Icon name="save" size={16} className="text-pink-500" /> 數據安全管理</h4>
                                        <div className="grid grid-cols-1 gap-3">
                                            <button 
                                                onClick={exportToCSV}
                                                className="w-full bg-pink-500 hover:bg-pink-600 text-white py-3.5 rounded-2xl font-bold active:scale-95 transition-all flex items-center justify-center gap-2 text-xs shadow-md"
                                            >
                                                <Icon name="download" size={16} /> 匯出備份 (Excel相容 CSV 檔)
                                            </button>

                                            <button 
                                                onClick={() => importFileInputRef.current.click()}
                                                className="w-full bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 py-3.5 rounded-2xl font-bold active:scale-95 transition-all flex items-center justify-center gap-2 text-xs shadow-sm"
                                            >
                                                <Icon name="upload" size={16} /> 匯入還原手帳資料 (.csv)
                                            </button>
                                            <input 
                                                type="file" 
                                                ref={importFileInputRef} 
                                                onChange={handleImportCSV} 
                                                accept=".csv" 
                                                className="hidden" 
                                            />
                                        </div>
                                    </div>
                                </div>

                                <footer className="text-center text-[10px] text-slate-300 font-medium">© 2026 MOMMY'S MOOD HARBOR</footer>
                            </div>
                        )}

                        {/* VIEW: HISTORY (日曆時光軌跡) */}
                        {view === 'history' && (
                            <div className="p-6 flex flex-col h-full bg-white relative text-slate-700">
                                <div className="flex items-center justify-between mb-4">
                                    <button onClick={() => setView('home')} className="p-2 hover:bg-slate-100 rounded-full transition-all active:scale-90 text-slate-400"><Icon name="left"/></button>
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1))} className="text-slate-300"><Icon name="left" size={16}/></button>
                                        <span className="font-bold text-sm text-slate-600">{currentMonth.getFullYear()}年 {currentMonth.getMonth()+1}月</span>
                                        <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1))} className="text-slate-300"><Icon name="right" size={16}/></button>
                                    </div>
                                    <button onClick={exportToCSV} className="p-2 text-pink-400 hover:bg-pink-50 rounded-full active:scale-90 transition-all" title="匯出 Excel 備份"><Icon name="download" size={20} /></button>
                                </div>
                                <div className="grid grid-cols-7 gap-1 border-b pb-4 mb-4">
                                    {['日', '一', '二', '三', '四', '五', '六'].map(d => <div key={d} className="text-center text-[10px] text-slate-300 font-bold py-2">{d}</div>)}
                                    {(() => {
                                        const year = currentMonth.getFullYear(); const month = currentMonth.getMonth();
                                        const total = new Date(year, month + 1, 0).getDate(); const start = new Date(year, month, 1).getDay();
                                        const days = [];
                                        for (let i = 0; i < start; i++) days.push(null);
                                        for (let i = 1; i <= total; i++) days.push(new Date(year, month, i));
                                        return days.map((d, i) => {
                                            if (!d) return <div key={i} className="h-9" />;
                                            const dayRecords = records.filter(r => r.timestamp && new Date(r.timestamp).toDateString() === d.toDateString());
                                            const isSelected = selectedDate.toDateString() === d.toDateString();
                                            return (
                                                <button key={i} onClick={() => setSelectedDate(d)} className={`h-9 rounded-xl flex items-center justify-center relative transition-all ${isSelected ? 'bg-pink-500 text-white shadow-md font-bold' : 'hover:bg-pink-50 text-slate-400'}`}>
                                                    <span className="text-xs">{d.getDate()}</span>
                                                    {dayRecords.length > 0 && <div className={`w-1 h-1 rounded-full absolute bottom-1 ${isSelected ? 'bg-white' : 'bg-pink-400'}`} />}
                                                </button>
                                            );
                                        });
                                    })()}
                                </div>
                                <div className="flex-grow overflow-y-auto space-y-3 custom-scrollbar">
                                    <div className="flex justify-between items-center px-1">
                                        <h4 className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">{selectedDate.toLocaleDateString()} 記錄軌跡</h4>
                                        {records.filter(r => r.timestamp && new Date(r.timestamp).toDateString() === selectedDate.toDateString()).length === 0 && (
                                            <button onClick={() => { startBackfill(selectedDate); }} className="text-[10px] text-pink-400 font-bold flex items-center gap-1 bg-pink-50 px-2 py-1 rounded-lg active:scale-90"><Icon name="plus" size={12}/> 補寫手帳</button>
                                        )}
                                    </div>
                                    {records.filter(r => r.timestamp && new Date(r.timestamp).toDateString() === selectedDate.toDateString()).length === 0 ? (
                                        <div className="text-center py-10 flex flex-col items-center gap-2 border-2 border-dashed border-slate-50 rounded-[2rem] m-2 animate-in fade-in">
                                            <Icon name="edit" size={24} className="text-slate-100" />
                                            <p className="text-slate-200 text-[10px]">這一天還沒有留下心情痕跡喔</p>
                                        </div>
                                    ) : (
                                        records.filter(r => r.timestamp && new Date(r.timestamp).toDateString() === selectedDate.toDateString()).map(r => (
                                            <div key={r.id} className="p-5 bg-slate-50 rounded-3xl border border-slate-100 group transition-all hover:shadow-md relative overflow-hidden min-h-[130px]">
                                                {/* 貼圖背景融入 */}
                                                <div className="absolute inset-0 pointer-events-none overflow-hidden flex items-center justify-around opacity-15 z-0 select-none">
                                                    {r.stickers && r.stickers.map((stk, sidx) => {
                                                        const rot = (sidx * 15 - 15) + "deg";
                                                        return stk.type === 'emoji' ? (
                                                            <span key={sidx} className="sticker-effect inline-block text-7xl font-bold" style={{ transform: `rotate(${rot})` }}>{stk.char}</span>
                                                        ) : (
                                                            <img key={sidx} src={stk.char} className="sticker-effect w-24 h-24 object-contain rounded-xl" style={{ transform: `rotate(${rot})` }} />
                                                        );
                                                    })}
                                                </div>

                                                <div className="relative z-10">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div className="flex items-center gap-2">
                                                            <div className="w-8 h-8 rounded-full flex items-center justify-center text-white font-black text-[10px] shadow-sm" style={{ backgroundColor: getMoodColor(r.score) }}>{r.score}</div>
                                                            <p className="text-[10px] font-bold text-slate-600">{r.text}</p>
                                                        </div>
                                                        <div className="flex gap-1">
                                                            <button onClick={() => { setEditingRecord({...r}); setSelectedStickers(r.stickers || []); }} className="p-2 text-slate-300 hover:text-pink-500 active:scale-90"><Icon name="edit" size={14} /></button>
                                                            <button onClick={() => setRecordToDelete(r)} className="p-2 text-slate-300 hover:text-red-500 active:scale-90"><Icon name="trash" size={14} /></button>
                                                        </div>
                                                    </div>
                                                    {r.diary && <p className="text-xs text-slate-600 leading-relaxed pt-2 border-t border-slate-200/50 font-medium">{r.diary}</p>}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* EDIT / BACKFILL RECORD MODAL */}
                        {editingRecord && (
                            <div className="absolute inset-0 bg-white z-[150] flex flex-col p-6 animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-bold flex items-center gap-2"><Icon name="edit" size={18} /> {editingRecord.isNew ? '補寫心情手帳' : '修改日記紀錄'}</h3>
                                    <button onClick={() => { setEditingRecord(null); setSelectedStickers([]); }} className="p-2 hover:bg-slate-100 rounded-full active:scale-90 transition-all text-slate-400"><Icon name="x" size={20}/></button>
                                </div>
                                <div className="flex items-center gap-4 mb-4 bg-slate-50 p-6 rounded-[2rem] border border-slate-100 shadow-inner">
                                    <canvas ref={canvasRef} width={60} height={170} />
                                    <div className="flex-1 space-y-4">
                                        <p className="text-xs font-bold" style={{ color: getMoodColor(editingRecord.score) }}>{getMoodText(editingRecord.score)} ({editingRecord.score})</p>
                                        <input type="range" min="0" max="100" value={editingRecord.score} onChange={e => setEditingRecord({...editingRecord, score: parseInt(e.target.value)})} className="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500" />
                                    </div>
                                </div>

                                <div className="mb-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-xs font-bold text-slate-400">手帳貼紙點綴</span>
                                        <button onClick={() => setShowStickerPicker(true)} className="flex items-center gap-1 text-xs text-pink-500 bg-pink-50 px-2 py-1 rounded-full font-bold">
                                            <Icon name="smile" size={12} /> 加上貼圖
                                        </button>
                                    </div>
                                    {selectedStickers.length > 0 && (
                                        <div className="flex gap-2 p-2 bg-pink-50/50 rounded-xl items-center flex-wrap">
                                            {selectedStickers.map((s, idx) => (
                                                <div key={idx} className="relative group">
                                                    {s.type === 'emoji' ? (
                                                        <span className="sticker-effect inline-block text-2xl select-none">{s.char}</span>
                                                    ) : (
                                                        <img src={s.char} className="sticker-effect w-8 h-8 object-contain rounded-md" />
                                                    )}
                                                    <button onClick={() => handleRemoveSelectedSticker(idx)} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5 shadow">
                                                        <Icon name="x" size={8} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <textarea value={editingRecord.diary} onChange={e => setEditingRecord({...editingRecord, diary: e.target.value})} className="flex-grow bg-slate-50 rounded-3xl p-5 text-sm outline-none resize-none mb-6 border border-slate-100 shadow-inner" />
                                <button 
                                    onClick={editingRecord.isNew ? handleSaveBackfill : handleUpdateRecord} 
                                    className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-all"
                                >
                                    <Icon name="save" size={18}/> 確定儲存手帳
                                </button>
                            </div>
                        )}

                        {/* STICKER PICKER MODAL */}
                        {showStickerPicker && (
                            <div className="absolute inset-x-0 bottom-0 bg-white rounded-t-[2.5rem] shadow-2xl border-t border-pink-100 p-6 z-[200] animate-in slide-in-from-bottom duration-300 max-h-[360px] flex flex-col">
                                <div className="flex justify-between items-center mb-4">
                                    <h4 className="font-bold text-pink-600 flex items-center gap-2">🧸 選擇貼圖貼紙</h4>
                                    <button onClick={() => setShowStickerPicker(false)} className="p-2 hover:bg-slate-100 rounded-full">
                                        <Icon name="x" size={18} className="text-slate-400" />
                                    </button>
                                </div>

                                <div className="flex border-b border-pink-50 mb-4 text-xs font-bold">
                                    <button onClick={() => setActiveStickerTab('builtin')} className={`flex-1 pb-3 text-center transition-all ${activeStickerTab === 'builtin' ? 'border-b-2 border-pink-500 text-pink-500' : 'text-slate-400'}`}>
                                        官方暖心繪圖
                                    </button>
                                    <button onClick={() => setActiveStickerTab('custom')} className={`flex-1 pb-3 text-center transition-all ${activeStickerTab === 'custom' ? 'border-b-2 border-pink-500 text-pink-500' : 'text-slate-400'}`}>
                                        超音波/自訂相片貼圖 ({customStickers.length})
                                    </button>
                                </div>

                                <div className="flex-grow overflow-y-auto custom-scrollbar pb-4">
                                    {activeStickerTab === 'builtin' && (
                                        <div className="grid grid-cols-5 gap-4 justify-items-center">
                                            {BUILTIN_STICKERS.map((stk) => (
                                                <button key={stk.id} onClick={() => handleAddSticker(stk)} className="text-4xl sticker-effect select-none p-1 focus:outline-none animate-in zoom-in-50">
                                                    {stk.char}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {activeStickerTab === 'custom' && (
                                        <div className="grid grid-cols-4 gap-4 justify-items-center items-center">
                                            <button onClick={() => fileInputRef.current.click()} className="w-16 h-16 rounded-2xl border-2 border-dashed border-pink-200 hover:border-pink-400 text-pink-400 flex items-center justify-center transition-colors active:scale-95" title="上傳照片製作手帳貼圖">
                                                <Icon name="plus" size={28} />
                                            </button>
                                            <input type="file" ref={fileInputRef} onChange={handleCustomStickerUpload} accept="image/*" className="hidden" />

                                            {customStickers.map((stk) => (
                                                <div key={stk.id} className="relative group w-16 h-16 animate-in fade-in zoom-in-75">
                                                    <img 
                                                        src={stk.char} 
                                                        onClick={() => handleAddSticker(stk)}
                                                        className="w-full h-full object-contain rounded-xl border border-slate-100 sticker-effect cursor-pointer" 
                                                    />
                                                    <button 
                                                        onClick={(e) => { 
                                                            e.stopPropagation();
                                                            e.preventDefault();
                                                            setStickerToDelete(stk); 
                                                        }} 
                                                        className="absolute -top-1.5 -right-1.5 bg-rose-500 hover:bg-rose-600 text-white rounded-full shadow-md transition-all active:scale-75 z-[210] w-5 h-5 flex items-center justify-center"
                                                        title="自本地刪除"
                                                    >
                                                        <Icon name="x" size={10} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <footer className="mt-4 text-[9px] text-slate-300 font-bold uppercase tracking-[0.2em] px-4 text-center">© 2026 MOMMY'S MOOD HARBOR ・ 給媽咪最溫柔的心靈手帳軌跡</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
