<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媽咪心情溫度計 - 溫馨陪伴空間</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff1f2; margin: 0; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #ec4899; cursor: pointer; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .tutorial-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1000; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; background-color: rgba(255, 241, 242, 0.95); backdrop-filter: blur(12px);
        }

        /* 經典實體貼紙白色邊框與陰影特效 */
        .sticker-effect {
            filter: drop-shadow(2px 0 0 #fff) drop-shadow(-2px 0 0 #fff) drop-shadow(0 2px 0 #fff) drop-shadow(0 -2px 0 #fff) drop-shadow(0 4px 6px rgba(0,0,0,0.15));
            transition: transform 0.2s ease-in-out;
        }
        .sticker-effect:hover {
            transform: scale(1.1) rotate(2deg);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 溫度計數值對照字串與顏色 ---
        function getMoodColor(s) {
            return s < 30 ? '#60a5fa' : s < 60 ? '#34d399' : s < 85 ? '#fbbf24' : '#f87171';
        }
        
        function getMoodText(s) {
            return s < 30 ? '平靜微憂' : s < 60 ? '愉快穩定' : s < 85 ? '焦慮上升' : '情緒緊繃';
        }

        // --- 穩定版 SVG 圖示組件 ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                calendar: (
                    <React.Fragment>
                        <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                        <path d="M16 2v4M8 2v4M3 10h18" />
                    </React.Fragment>
                ),
                info: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4M12 8h.01" />
                    </React.Fragment>
                ),
                thermometer: <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z" />,
                check: (
                    <React.Fragment>
                        <path d="m9 11 3 3L22 4" />
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                    </React.Fragment>
                ),
                edit: (
                    <React.Fragment>
                        <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z" />
                    </React.Fragment>
                ),
                message: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
                trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />,
                save: (
                    <React.Fragment>
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                        <polyline points="7 3 7 8 15 8" />
                    </React.Fragment>
                ),
                download: (
                    <React.Fragment>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" x2="12" y1="15" y2="3" />
                    </React.Fragment>
                ),
                left: <path d="m15 18-6-6 6-6" />,
                right: <path d="m9 18 6-6 9-6" />,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                plus: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 12h8M12 8v8" />
                    </React.Fragment>
                ),
                sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z" />,
                loader: <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />,
                send: (
                    <React.Fragment>
                        <path d="m22 2-7 20-4-9-9-4Z" />
                        <path d="M22 2 11 13" />
                    </React.Fragment>
                ),
                image: (
                    <React.Fragment>
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                        <circle cx="9" cy="9" r="2" />
                        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                    </React.Fragment>
                ),
                smile: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" />
                    </React.Fragment>
                ),
                alert: (
                    <React.Fragment>
                        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
                        <line x1="12" y1="9" x2="12" y2="13" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </React.Fragment>
                ),
                upload: (
                    <React.Fragment>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="17 8 12 3 7 8" />
                        <line x1="12" x2="12" y1="3" y2="15" />
                    </React.Fragment>
                )
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- 內建貼圖列表 ---
        const BUILTIN_STICKERS = [
            { id: "s_baby", char: "👶", type: "emoji" },
            { id: "s_bottle", char: "🍼", type: "emoji" },
            { id: "s_pregnant", char: "🤰", type: "emoji" },
            { id: "s_teddy", char: "🧸", type: "emoji" },
            { id: "s_feet", char: "👣", type: "emoji" },
            { id: "s_heart", char: "💖", type: "emoji" },
            { id: "s_coffee", char: "☕", type: "emoji" },
            { id: "s_star", char: "⭐", type: "emoji" },
            { id: "s_clover", char: "🍀", type: "emoji" },
            { id: "s_sun", char: "☀️", type: "emoji" },
            { id: "s_smile", char: "😊", type: "emoji" },
            { id: "s_cry", char: "😭", type: "emoji" },
            { id: "s_tired", char: "😴", type: "emoji" },
            { id: "s_love", char: "🥰", type: "emoji" },
            { id: "s_party", char: "🥳", type: "emoji" }
        ];

        // --- 手帳引導說明頁面資料 ---
        const tutorialSlides = [
            { title: "歡迎來到妳的避風港 💖", desc: "親愛的媽咪，這本心情溫度手帳會陪妳度過這段奇妙的孕期旅程。", icon: "heart" },
            { title: "心情溫度計 🌡️", desc: "每天滑動溫度計記錄情緒，點選「儲存紀錄」即可留下當下的印記。", icon: "thermometer" },
            { title: "暖心與自訂貼圖 🧸", desc: "日記中可以加入實體貼紙效果的可愛貼圖，還能上傳超音波照片智慧微縮成專屬貼圖，完全不卡頓、不佔空間！", icon: "smile" },
            { title: "今日心情快篩 📝", desc: "首頁上方的卡片可以進行快速自我心情篩檢。", icon: "check" },
            { title: "備份還原最安全 💾", desc: "平常關機資料絕對不會消失，但若要『清除瀏覽器快取前』，請記得點選右上角下載 Excel/CSV 備份檔，隨時一鍵還原喔！", icon: "save" },
            { title: "Gemini 溫柔陪伴 ✨", desc: "任何想傾訴的時候，點擊右下角對話泡泡，Gemini 隨時會溫柔聆聽並給妳暖心回饋。", icon: "message" }
        ];

        const App = () => {
            const [view, setView] = useState('welcome'); 
            const [moodScore, setMoodScore] = useState(50);
            const [diaryText, setDiaryText] = useState('');
            
            // 在地儲存核心狀態
            const [records, setRecords] = useState([]);
            const [customStickers, setCustomStickers] = useState([]);
            const [selectedStickers, setSelectedStickers] = useState([]);
            
            // 介面控制狀態
            const [showStickerPicker, setShowStickerPicker] = useState(false);
            const [activeStickerTab, setActiveStickerTab] = useState('builtin');
            const [toast, setToast] = useState('');
            const [stickerToDelete, setStickerToDelete] = useState(null);
            const [recordToDelete, setRecordToDelete] = useState(null);
            const [showDisclaimerPopup, setShowDisclaimerPopup] = useState(false);

            const [chatMessages, setChatMessages] = useState([{ role: 'assistant', text: '親愛的媽咪，我是 Gemini。今天感覺如何？任何想說的心裡話，都可以隨時跟我分享喔。' }]);
            const [inputMessage, setInputMessage] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [showTutorial, setShowTutorial] = useState(false);
            const [tutorialStep, setTutorialStep] = useState(0);
            const [surveyResults, setSurveyResults] = useState({ q1: null, q2: null });
            const [showSurveyResult, setShowSurveyResult] = useState(false);
            const [editingRecord, setEditingRecord] = useState(null);
            
            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);
            const importFileInputRef = useRef(null);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3000);
            };

            // --- 讀取在地 LocalStorage 紀錄 ---
            useEffect(() => {
                const storedRecords = localStorage.getItem('mommy_mood_records');
                const storedStickers = localStorage.getItem('mommy_custom_stickers');
                const tutorialSeen = localStorage.getItem('mommy_tutorial_seen');
                const guestGranted = localStorage.getItem('guest_access_granted');

                if (storedRecords) setRecords(JSON.parse(storedRecords));
                if (storedStickers) setCustomStickers(JSON.parse(storedStickers));
                
                if (guestGranted === 'true') {
                    setView('home');
                }
                if (tutorialSeen !== 'true') {
                    setShowTutorial(true);
                }
            }, []);

            // --- 儲存心情與日記紀錄 ---
            const handleSave = () => {
                const newRecord = {
                    id: 'rec_' + Date.now(),
                    score: moodScore, 
                    text: getMoodText(moodScore), 
                    diary: diaryText, 
                    stickers: selectedStickers,
                    timestamp: Date.now()
                };
                const updated = [newRecord, ...records];
                setRecords(updated);
                localStorage.setItem('mommy_mood_records', JSON.stringify(updated));
                setDiaryText(''); 
                setSelectedStickers([]);
                setView('history');
                showToast("🎉 今日日記儲存成功！");
            };

            // --- 刪除紀錄 ---
            const handleDeleteRecord = (id) => {
                const updated = records.filter(r => r.id !== id);
                setRecords(updated);
                localStorage.setItem('mommy_mood_records', JSON.stringify(updated));
                setRecordToDelete(null);
                showToast("🗑️ 日記已成功刪除");
            };

            // --- 更新紀錄 ---
            const handleUpdateRecord = () => {
                if (!editingRecord) return;
                const updated = records.map(r => r.id === editingRecord.id ? {
                    ...r,
                    score: editingRecord.score,
                    text: getMoodText(editingRecord.score),
                    diary: editingRecord.diary,
                    stickers: selectedStickers
                } : r);
                setRecords(updated);
                localStorage.setItem('mommy_mood_records', JSON.stringify(updated));
                setEditingRecord(null);
                setSelectedStickers([]);
                showToast("💾 日記修改成功！");
            };

            // --- 補寫日記 ---
            const startBackfill = (date) => {
                const midnightTimestamp = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12, 0, 0).getTime();
                setEditingRecord({
                    id: 'rec_' + Date.now(),
                    score: 50,
                    diary: '',
                    text: getMoodText(50),
                    timestamp: midnightTimestamp,
                    isNew: true
                });
                setSelectedStickers([]);
            };

            const handleSaveBackfill = () => {
                if (!editingRecord) return;
                const newRecord = {
                    id: editingRecord.id,
                    score: editingRecord.score,
                    text: getMoodText(editingRecord.score),
                    diary: editingRecord.diary,
                    stickers: selectedStickers,
                    timestamp: editingRecord.timestamp
                };
                const updated = [newRecord, ...records];
                setRecords(updated);
                localStorage.setItem('mommy_mood_records', JSON.stringify(updated));
                setEditingRecord(null);
                setSelectedStickers([]);
                showToast("✍️ 已成功補記日記！");
            };

            // --- 自訂上傳貼圖處理（智慧 Canvas 微縮） ---
            const handleCustomStickerUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxDim = 120; 
                        let w = img.width;
                        let h = img.height;
                        if (w > h) {
                            if (w > maxDim) {
                                h = Math.round((h * maxDim) / w);
                                w = maxDim;
                            }
                        } else {
                            if (h > maxDim) {
                                w = Math.round((w * maxDim) / h);
                                h = maxDim;
                            }
                        }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        
                        const base64 = canvas.toDataURL('image/png', 0.7);
                        const newSticker = {
                            id: 'stk_' + Date.now(),
                            char: base64,
                            type: 'custom',
                            timestamp: Date.now()
                        };
                        const updated = [newSticker, ...customStickers];
                        setCustomStickers(updated);
                        localStorage.setItem('mommy_custom_stickers', JSON.stringify(updated));
                        showToast("📸 超音波相片貼圖製作成功！");
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleDeleteCustomSticker = (id) => {
                const updated = customStickers.filter(s => s.id !== id);
                setCustomStickers(updated);
                localStorage.setItem('mommy_custom_stickers', JSON.stringify(updated));
                setSelectedStickers(prev => prev.filter(s => s.id !== id));
                setStickerToDelete(null);
                showToast("🗑️ 自訂貼圖已刪除");
            };

            // --- 智慧 CSV / Excel 備份匯出 ---
            const exportToCSV = () => {
                if (records.length === 0) {
                    showToast("目前沒有日記資料可以備份喔！");
                    return;
                }
                const sorted = [...records].sort((a,b) => b.timestamp - a.timestamp);
                
                // BOM 確保 Excel 開啟時中文不會亂碼
                let csvContent = "\uFEFF";
                csvContent += "日期時間,心情分數,心情狀態,日記內容,手帳貼紙資訊\n";
                
                sorted.forEach(r => {
                    const dateStr = new Date(r.timestamp).toLocaleString('zh-TW');
                    const score = r.score;
                    const text = r.text;
                    const diary = (r.diary || "").replace(/"/g, '""'); // 雙引號防呆
                    const stickersStr = r.stickers && r.stickers.length > 0 
                        ? r.stickers.map(s => s.type === 'emoji' ? s.char : '[自訂超音波貼圖]').join(' ')
                        : '無';
                        
                    csvContent += `"${dateStr}","${score}","${text}","${diary}","${stickersStr}"\n`;
                });

                // 同時把客製貼紙跟日記完整 JSON 打包進檔案最尾端，供未來100%還原用
                const backupPackage = {
                    records: records,
                    customStickers: customStickers
                };
                csvContent += `\n#=== 備份還原專用核心數據 (請勿修改此行以下內容) ===#\n`;
                csvContent += JSON.stringify(backupPackage);

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `媽咪溫馨手帳備份_${new Date().toLocaleDateString('zh-TW').replace(/\//g, '-')}.csv`;
                a.click();
                URL.revokeObjectURL(url);
                showToast("💾 備份 CSV 檔案已成功下載！");
            };

            // --- 智慧 CSV 備份還原 ---
            const handleImportCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        const delimiter = "#=== 備份還原專用核心數據 (請勿修改此行以下內容) ===#\n";
                        const parts = text.split(delimiter);
                        
                        if (parts.length < 2) {
                            showToast("❌ 格式不符！請上傳本程式產生的備份 CSV 檔");
                            return;
                        }

                        const backupData = JSON.parse(parts[1].trim());
                        if (backupData.records) {
                            setRecords(backupData.records);
                            localStorage.setItem('mommy_mood_records', JSON.stringify(backupData.records));
                        }
                        if (backupData.customStickers) {
                            setCustomStickers(backupData.customStickers);
                            localStorage.setItem('mommy_custom_stickers', JSON.stringify(backupData.customStickers));
                        }
                        showToast("✨ 恭喜！手帳日記與貼圖已成功還原！");
                        setView('home');
                    } catch (err) {
                        console.error("還原失敗", err);
                        showToast("❌ 解析備份檔出錯，請確保檔案未被修改。");
                    }
                };
                reader.readAsText(file, 'utf-8');
            };

            const handleCompleteTutorialLocal = () => {
                localStorage.setItem('mommy_tutorial_seen', 'true');
                setShowTutorial(false);
            };

            const handleGuestAccessLocal = () => {
                localStorage.setItem('guest_access_granted', 'true');
                setView('home');
                showToast("🌸 歡迎進入心情空間！");
            };

            // --- 溫度計 Canvas 繪圖 ---
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const score = editingRecord ? editingRecord.score : moodScore;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const color = getMoodColor(score);
                
                ctx.beginPath();
                ctx.arc(30, 135, 24, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(20, 135); ctx.lineTo(20, 25);
                ctx.arc(30, 25, 10, Math.PI, 0);
                ctx.lineTo(40, 135);
                ctx.fillStyle = '#f8fafc'; ctx.fill(); ctx.stroke();

                const fillH = (110) * (score / 100);
                ctx.fillStyle = color;
                ctx.fillRect(23, 130 - fillH, 14, fillH);
            }, [moodScore, view, editingRecord]);

            // --- 溫柔 Gemini 夥伴 ---
            const callGemini = async (prompt) => {
                const apiKey = "";
                const maxRetries = 5;
                let delay = 1000;

                for (let i = 0; i < maxRetries; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: "妳是一位溫柔、有耐心的孕期心理諮詢顧問。請用溫暖的口氣安慰並鼓勵媽咪。字數保持在 150 字以內。" }] }
                            })
                        });
                        if (!response.ok) throw new Error("API 響應錯誤");
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text || "媽咪，我一直在這，慢說，我聽著呢。";
                    } catch (err) {
                        if (i === maxRetries - 1) throw err;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

                                </div>
                                <div className="flex-grow overflow-y-auto space-y-3 custom-scrollbar">
                                    <div className="flex justify-between items-center px-1">
                                        <h4 className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">{selectedDate.toLocaleDateString()} 紀錄</h4>
                                        {records.filter(r => r.timestamp && new Date(r.timestamp).toDateString() === selectedDate.toDateString()).length === 0 && (
                                            <button onClick={() => { startBackfill(selectedDate); }} className="text-[10px] text-pink-400 font-bold flex items-center gap-1 bg-pink-50 px-2 py-1 rounded-lg active:scale-90"><Icon name="plus" size={12}/> 補寫日記</button>
                                        )}
                                    </div>
                                    {records.filter(r => r.timestamp && new Date(r.timestamp).toDateString() === selectedDate.toDateString()).length === 0 ? (
                                        <div className="text-center py-10 flex flex-col items-center gap-2 border-2 border-dashed border-slate-50 rounded-[2rem] m-2 animate-in fade-in">
                                            <Icon name="edit" size={24} className="text-slate-100" />
                                            <p className="text-slate-200 text-[10px]">這天還沒有心情足跡喔</p>
                                        </div>
                                    ) : (
                                        records.filter(r => r.timestamp && new Date(r.timestamp).toDateString() === selectedDate.toDateString()).map(r => (
                                            <div key={r.id} className="p-5 bg-slate-50 rounded-3xl border border-slate-100 group transition-all hover:shadow-md relative overflow-hidden min-h-[130px]">
                                                
                                                {/* 貼圖背景融入 */}
                                                <div className="absolute inset-0 pointer-events-none overflow-hidden flex items-center justify-around opacity-15 z-0 select-none">
                                                    {r.stickers && r.stickers.map((stk, sidx) => {
                                                        const rot = (sidx * 15 - 15) + "deg";
                                                        return stk.type === 'emoji' ? (
                                                            <span key={sidx} className="sticker-effect inline-block text-7xl font-bold" style={{ transform: `rotate(${rot})` }}>
                                                                {stk.char}
                                                            </span>
                                                        ) : (
                                                            <img key={sidx} src={stk.char} className="sticker-effect w-24 h-24 object-contain rounded-xl" style={{ transform: `rotate(${rot})` }} />
                                                        );
                                                    })}
                                                </div>

                                                <div className="relative z-10">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div className="flex items-center gap-2">
                                                            <div className="w-8 h-8 rounded-full flex items-center justify-center text-white font-black text-[10px] shadow-sm" style={{ backgroundColor: getMoodColor(r.score) }}>{r.score}</div>
                                                            <p className="text-[10px] font-bold text-slate-600">{r.text}</p>
                                                        </div>
                                                        <div className="flex gap-1">
                                                            <button onClick={() => { setEditingRecord({...r}); setSelectedStickers(r.stickers || []); }} className="p-2 text-slate-300 hover:text-pink-500 active:scale-90"><Icon name="edit" size={14} /></button>
                                                            <button onClick={() => setRecordToDelete(r)} className="p-2 text-slate-300 hover:text-red-500 active:scale-90"><Icon name="trash" size={14} /></button>
                                                        </div>
                                                    </div>
                                                    {r.diary && <p className="text-xs text-slate-600 leading-relaxed pt-2 border-t border-slate-200/50 font-medium">{r.diary}</p>}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* SURVEY */}
                        {view === 'survey' && (
                            <div className="p-6 flex flex-col h-full bg-slate-50">
                                <div className="flex items-center gap-2 mb-6">
                                    <button onClick={() => setView('home')} className="p-2 bg-white rounded-full shadow-sm active:scale-90 transition-all text-slate-300"><Icon name="left"/></button>
                                    <h3 className="text-lg font-bold">📝 快速評估</h3>
                                </div>
                                <div className="space-y-4">
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                                        <p className="font-bold text-sm mb-2 text-slate-700">【關於情緒】💓</p>
                                        <p className="text-xs text-slate-400 mb-6 leading-relaxed">過去一個月，妳是否常覺得情緒低落、憂鬱，或對未來感到沒有希望？</p>
                                        <div className="flex gap-3">
                                            <button onClick={() => setSurveyResults(p => ({...p, q1: 'yes'}))} className={`flex-1 py-3 rounded-2xl border-2 font-bold transition-all ${surveyResults.q1 === 'yes' ? 'bg-pink-500 border-pink-500 text-white' : 'bg-white border-slate-100 text-slate-400'}`}>是</button>
                                            <button onClick={() => setSurveyResults(p => ({...p, q1: 'no'}))} className={`flex-1 py-3 rounded-2xl border-2 font-bold transition-all ${surveyResults.q1 === 'no' ? 'bg-pink-500 border-pink-500 text-white' : 'bg-white border-slate-100 text-slate-400'}`}>否</button>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                                        <p className="font-bold text-sm mb-2 text-slate-700">【關於動力】💪</p>
                                        <p className="text-xs text-slate-400 mb-6 leading-relaxed">過去一個月，妳是否常對原本喜歡的事物失去興趣，或覺得做什麼都提不起勁？</p>
                                        <div className="flex gap-3">
                                            <button onClick={() => setSurveyResults(p => ({...p, q2: 'yes'}))} className={`flex-1 py-3 rounded-2xl border-2 font-bold transition-all ${surveyResults.q2 === 'yes' ? 'bg-pink-500 border-pink-500 text-white' : 'bg-white border-slate-100 text-slate-400'}`}>是</button>
                                            <button onClick={() => setSurveyResults(p => ({...p, q2: 'no'}))} className={`flex-1 py-3 rounded-2xl border-2 font-bold transition-all ${surveyResults.q2 === 'no' ? 'bg-pink-500 border-pink-500 text-white' : 'bg-white border-slate-100 text-slate-400'}`}>否</button>
                                        </div>
                                    </div>

                                    {surveyResults.q1 && surveyResults.q2 && !showSurveyResult && (
                                        <button onClick={() => setShowSurveyResult(true)} className="w-full bg-pink-500 text-white py-4 rounded-3xl font-bold shadow-lg animate-in zoom-in-95 active:scale-95 transition-all">送出評估</button>
                                    )}
                                    {showSurveyResult && (
                                        <div className="p-6 rounded-[2.5rem] bg-indigo-50 border-2 border-indigo-100 text-center animate-in slide-in-from-bottom">
                                            <Icon name="sparkles" className="mx-auto text-indigo-400 mb-2" />
                                            <p className="text-sm text-indigo-900 font-bold mb-4">
                                                {surveyResults.q1 === 'yes' || surveyResults.q2 === 'yes' 
                                                    ? '分析完成！媽咪最近有些壓力，建議找伴侶聊聊，或找 Gemini 說說話喔。' 
                                                    : '分析完成！看起來狀態挺不錯的，請繼續保持愉快穩定的心情。'}
                                            </p>
                                            <button onClick={() => setView('chat')} className="w-full bg-indigo-500 text-white py-3 rounded-2xl text-xs font-bold shadow-md active:scale-95 transition-all">找 Gemini 聊天領取建議</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'chat' && (
                            <div className="flex flex-col h-full bg-slate-50">
                                <div className="p-4 border-b bg-indigo-50 flex items-center gap-3">
                                    <button onClick={() => setView('home')} className="p-2 bg-white rounded-full active:scale-90 transition-all text-indigo-300"><Icon name="left"/></button>
                                    <h3 className="font-bold text-indigo-700 text-sm tracking-tight">Gemini 溫柔夥伴</h3>
                                </div>
                                <div className="flex-grow overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                    {chatMessages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-4 rounded-[1.8rem] text-xs leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-indigo-500 text-white rounded-tr-none' : 'bg-white text-slate-600 rounded-tl-none border border-indigo-50'}`}>{m.text}</div>
                                        </div>
                                    ))}
                                    {isTyping && <div className="text-[10px] text-indigo-400 italic px-4 animate-pulse">Gemini 正在打字中...</div>}
                                </div>
                                <div className="p-4 bg-white border-t flex gap-2">
                                    <input type="text" value={inputMessage} onChange={e => setInputMessage(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()} placeholder="跟 Gemini 說說話吧..." className="flex-1 bg-slate-50 rounded-2xl px-5 py-3 text-xs outline-none focus:ring-2 focus:ring-indigo-100" />
                                    <button onClick={sendMessage} className="bg-indigo-500 text-white p-3 rounded-2xl shadow-md active:scale-95 transition-all"><Icon name="send" size={18} /></button>
                                </div>
                            </div>
                        )}

                        {/* EDIT / BACKFILL RECORD MODAL */}
                        {editingRecord && (
                            <div className="absolute inset-0 bg-white z-[150] flex flex-col p-6 animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-bold flex items-center gap-2"><Icon name="edit" size={18} /> {editingRecord.isNew ? '補寫手帳' : '修改紀錄'}</h3>
                                    <button onClick={() => { setEditingRecord(null); setSelectedStickers([]); }} className="p-2 hover:bg-slate-100 rounded-full active:scale-90 transition-all text-slate-400"><Icon name="x" size={20}/></button>
                                </div>
                                <div className="flex items-center gap-4 mb-4 bg-slate-50 p-6 rounded-[2rem] border border-slate-100 shadow-inner">
                                    <canvas ref={canvasRef} width={60} height={170} />
                                    <div className="flex-1 space-y-4">
                                        <p className="text-xs font-bold" style={{ color: getMoodColor(editingRecord.score) }}>{getMoodText(editingRecord.score)} ({editingRecord.score})</p>
                                        <input type="range" min="0" max="100" value={editingRecord.score} onChange={e => setEditingRecord({...editingRecord, score: parseInt(e.target.value)})} className="w-full h-2 bg-pink-100 rounded-lg appearance-none cursor-pointer accent-pink-500" />
                                    </div>
                                </div>

                                {/* 編輯紀錄時的貼圖管理 */}
                                <div className="mb-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-xs font-bold text-slate-400">手帳貼圖裝飾</span>
                                        <button onClick={() => setShowStickerPicker(true)} className="flex items-center gap-1 text-xs text-pink-500 bg-pink-50 px-2 py-1 rounded-full font-bold">
                                            <Icon name="smile" size={12} /> 新增貼紙
                                        </button>
                                    </div>
                                    {selectedStickers.length > 0 && (
                                        <div className="flex gap-2 p-2 bg-pink-50/50 rounded-xl items-center flex-wrap">
                                            {selectedStickers.map((s, idx) => (
                                                <div key={idx} className="relative group">
                                                    {s.type === 'emoji' ? (
                                                        <span className="sticker-effect inline-block text-2xl select-none">{s.char}</span>
                                                    ) : (
                                                        <img src={s.char} className="sticker-effect w-8 h-8 object-contain rounded-md" />
                                                    )}
                                                    <button onClick={() => handleRemoveSelectedSticker(idx)} className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-0.5 shadow">
                                                        <Icon name="x" size={8} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <textarea value={editingRecord.diary} onChange={e => setEditingRecord({...editingRecord, diary: e.target.value})} className="flex-grow bg-slate-50 rounded-3xl p-5 text-sm outline-none resize-none mb-6 border border-slate-100 shadow-inner" />
                                <button 
                                    onClick={editingRecord.isNew ? handleSaveBackfill : handleUpdateRecord} 
                                    className="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-all"
                                >
                                    <Icon name="save" size={18}/> 確定儲存手帳
                                </button>
                            </div>
                        )}

                        {/* STICKER PICKER MODAL */}
                        {showStickerPicker && (
                            <div className="absolute inset-x-0 bottom-0 bg-white rounded-t-[2.5rem] shadow-2xl border-t border-pink-100 p-6 z-[200] animate-in slide-in-from-bottom duration-300 max-h-[360px] flex flex-col">
                                <div className="flex justify-between items-center mb-4">
                                    <h4 className="font-bold text-pink-600 flex items-center gap-2">🧸 選擇貼圖</h4>
                                    <button onClick={() => setShowStickerPicker(false)} className="p-2 hover:bg-slate-100 rounded-full">
                                        <Icon name="x" size={18} className="text-slate-400" />
                                    </button>
                                </div>

                                <div className="flex border-b border-pink-50 mb-4 text-xs font-bold">
                                    <button onClick={() => setActiveStickerTab('builtin')} className={`flex-1 pb-3 text-center transition-all ${activeStickerTab === 'builtin' ? 'border-b-2 border-pink-500 text-pink-500' : 'text-slate-400'}`}>
                                        內建暖心貼圖
                                    </button>
                                    <button onClick={() => setActiveStickerTab('custom')} className={`flex-1 pb-3 text-center transition-all ${activeStickerTab === 'custom' ? 'border-b-2 border-pink-500 text-pink-500' : 'text-slate-400'}`}>
                                        自訂貼圖 ({customStickers.length})
                                    </button>
                                </div>

                                <div className="flex-grow overflow-y-auto custom-scrollbar pb-4">
                                    {activeStickerTab === 'builtin' && (
                                        <div className="grid grid-cols-5 gap-4 justify-items-center">
                                            {BUILTIN_STICKERS.map((stk) => (
                                                <button key={stk.id} onClick={() => handleAddSticker(stk)} className="text-4xl sticker-effect select-none p-1 focus:outline-none animate-in zoom-in-50">
                                                    {stk.char}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {activeStickerTab === 'custom' && (
                                        <div className="grid grid-cols-4 gap-4 justify-items-center items-center">
                                            <button onClick={() => fileInputRef.current.click()} className="w-16 h-16 rounded-2xl border-2 border-dashed border-pink-200 hover:border-pink-400 text-pink-400 flex items-center justify-center transition-colors active:scale-95" title="上傳照片做成貼圖">
                                                <Icon name="plus" size={28} />
                                            </button>
                                            <input type="file" ref={fileInputRef} onChange={handleCustomStickerUpload} accept="image/*" className="hidden" />

                                            {customStickers.map((stk) => (
                                                <div key={stk.id} className="relative group w-16 h-16 animate-in fade-in zoom-in-75">
                                                    <img 
                                                        src={stk.char} 
                                                        onClick={() => handleAddSticker(stk)}
                                                        className="w-full h-full object-contain rounded-xl border border-slate-100 sticker-effect cursor-pointer" 
                                                    />
                                                    <button 
                                                        onClick={(e) => { 
                                                            e.stopPropagation();
                                                            e.preventDefault();
                                                            setStickerToDelete(stk); 
                                                        }} 
                                                        className="absolute -top-1.5 -right-1.5 bg-rose-500 hover:bg-rose-600 text-white rounded-full shadow-md transition-all active:scale-75 z-[210] w-5 h-5 flex items-center justify-center"
                                                        title="自本機刪除貼圖"
                                                    >
                                                        <Icon name="x" size={10} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <footer className="mt-4 text-[9px] text-slate-300 font-bold uppercase tracking-[0.2em] px-4 text-center">© 2024 MOMMY'S MOOD HARBOR ・ 給媽咪最溫柔的記憶足跡</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
